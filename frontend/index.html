<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CyberShield SOC - Enterprise Security Operations Dashboard">
  <meta name="theme-color" content="#090c15">
  <title>CYBERSHIELD | Enterprise SOC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
:root{--bg-void:#090c15;--bg-deep:#0e1220;--bg-surface:#141a2e;--bg-raised:#1c243f;--cyan:#38bdf8;--cyan-dim:rgba(56,189,248,0.08);--blue-electric:#3b82f6;--purple:#818cf8;--danger:#ef4444;--danger-dim:rgba(239,68,68,0.08);--warning:#f59e0b;--warning-dim:rgba(245,158,11,0.08);--success:#10b981;--success-dim:rgba(16,185,129,0.08);--font-display:'Plus Jakarta Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--font-body:'Inter',sans-serif;--border-subtle:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.12);--gap:16px;--radius:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg-void);color:#f1f5f9;font-family:var(--font-body);font-size:13.5px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan)}

/* Layout */
.dashboard-layout{display:grid;grid-template-columns:320px 1fr 380px;grid-template-rows:64px 1fr;gap:var(--gap);padding:var(--gap);height:100vh;max-height:100vh}
.header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:0 24px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius)}
.logo-container{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;border:1.5px solid var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:16px}
.logo-text{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:2px;color:#fff}
.logo-version{font-family:var(--font-mono);font-size:10px;color:var(--cyan);opacity:.6;letter-spacing:1px;margin-left:4px;align-self:flex-end;margin-bottom:2px}
.header-center{display:flex;align-items:center;gap:24px}
.header-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.header-stat-value{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--cyan)}
.header-stat-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#64748b}
.header-divider{width:1px;height:24px;background:var(--border-subtle)}
.system-status{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px}
.status-indicator{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid rgba(16,185,129,0.2);border-radius:20px;background:rgba(16,185,129,0.05)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.status-text{color:var(--success);font-size:10px;font-weight:600;letter-spacing:1px}
.nav-tabs{display:flex;gap:4px;background:rgba(0,0,0,0.15);border:1px solid var(--border-subtle);border-radius:6px;padding:3px}
.nav-tab{background:transparent;border:none;color:#94a3b8;font-family:var(--font-body);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;cursor:pointer;padding:5px 14px;border-radius:4px;transition:all .15s;display:inline-flex;align-items:center;text-decoration:none}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,0.05)}
.nav-tab.active{color:#fff;background:var(--cyan-dim);border:1px solid rgba(56,189,248,0.3);font-weight:600}
.left-col,.center-col,.right-col{display:flex;flex-direction:column;gap:var(--gap);min-height:0}
.glass-panel{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:border-color .2s}
.glass-panel:hover{border-color:var(--border-mid)}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle);font-family:var(--font-display);font-size:11.5px;font-weight:600;letter-spacing:1px;color:#fff;text-transform:uppercase;flex-shrink:0}
.panel-header i{font-size:12px;color:var(--cyan)}
.panel-badge{margin-left:auto;font-family:var(--font-mono);font-size:9.5px;padding:2px 8px;border-radius:4px;border:1px solid currentColor;letter-spacing:.5px}
.flex-between{justify-content:space-between}

/* Packet Stream */
.packet-stream{flex:1;overflow-y:auto;font-family:var(--font-mono);font-size:11px;min-height:0}
.stream-header{display:grid;grid-template-columns:65px 1fr 1fr 44px;gap:4px;padding:4px 8px;font-size:9px;letter-spacing:1px;color:#64748b;border-bottom:1px solid var(--border-subtle);margin-bottom:4px;text-transform:uppercase}
.packet-item{display:grid;grid-template-columns:65px 1fr 1fr 44px;gap:4px;padding:5px 8px;border-radius:4px;transition:background .1s;border-bottom:1px solid rgba(255,255,255,0.01)}
.packet-item:hover{background:rgba(255,255,255,0.03)}
.packet-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.packet-item.suspicious{color:var(--warning);background:var(--warning-dim);border-left:2.5px solid var(--warning)}
.packet-item.malicious{color:var(--danger);background:var(--danger-dim);border-left:2.5px solid var(--danger)}
.proto-badge{font-size:8.5px;padding:1px 4px;border-radius:3px;text-align:center;font-weight:600;display:inline-block}
.proto-TCP{background:rgba(59,130,246,0.15);color:#60a5fa}
.proto-UDP{background:rgba(129,140,248,0.15);color:#a5b4fc}
.proto-OTHER{background:rgba(255,255,255,0.08);color:#94a3b8}
.stream-controls{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0}
.stream-meta{display:flex;gap:16px;font-family:var(--font-mono);font-size:10px;color:#64748b;margin-bottom:8px;flex-shrink:0}

/* Graph */
.graph-wrapper{flex:1;display:flex;flex-direction:column;min-height:0;gap:8px}
.graph-container{flex:1;display:flex;align-items:flex-end;gap:3px;padding:0 4px;position:relative;min-height:100px}
.graph-axis-y{position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--border-subtle)}
.graph-axis-x{position:absolute;left:0;right:4px;bottom:0;height:1px;background:var(--border-subtle)}
.graph-gridline{position:absolute;left:0;right:0;height:1px;background:var(--border-subtle)}
.graph-bar{flex:1;border-radius:2px 2px 0 0;transition:height .3s;min-height:2px;position:relative}
.graph-bar.normal{background:linear-gradient(180deg,var(--cyan) 0%,rgba(56,189,248,0.2) 100%)}
.graph-bar.suspicious{background:linear-gradient(180deg,var(--warning) 0%,rgba(245,158,11,0.2) 100%)}
.graph-bar.threat{background:linear-gradient(180deg,var(--danger) 0%,rgba(239,68,68,0.2) 100%)}
.graph-legend{display:flex;gap:16px;font-size:9px;font-family:var(--font-mono);letter-spacing:.5px;color:#64748b;flex-shrink:0}
.legend-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}

/* Buttons */
.cyber-btn{background:var(--blue-electric);color:#fff;border:none;padding:10px 20px;font-size:11px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:background .15s;border-radius:var(--radius);font-weight:600;width:100%}
.cyber-btn:hover:not(:disabled){background:#2563eb}
.cyber-btn:disabled{opacity:.5;cursor:not-allowed}
.cyber-btn.scanning{background:var(--warning)}
.cyber-btn-sm{background:transparent;border:1px solid var(--border-subtle);color:#94a3b8;font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cyber-btn-sm:hover,.cyber-btn-sm.active{border-color:var(--cyan);color:#fff;background:var(--cyan-dim)}
.cyber-btn-sm.danger{color:var(--danger);border-color:rgba(239,68,68,0.2)}
.cyber-btn-sm.danger:hover,.cyber-btn-sm.danger.active{background:var(--danger-dim);border-color:var(--danger);color:#fff}

/* Threat items */
.threat-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border-subtle);border-radius:6px;gap:10px}
.threat-item.High,.threat-item.Critical{border-left:3px solid var(--danger);background:var(--danger-dim)}
.threat-item.Medium{border-left:3px solid var(--warning);background:var(--warning-dim)}
.threat-item.Low{border-left:3px solid var(--success);background:var(--success-dim)}
.threat-name{font-size:11px;font-weight:600;color:#fff;margin-bottom:2px}
.threat-action{font-size:9.5px;color:#64748b;font-family:var(--font-mono)}
.execute-btn{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#60a5fa;font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all .15s}
.execute-btn:hover:not(:disabled){background:rgba(59,130,246,0.2)}
.execute-btn.done{background:var(--success-dim);border-color:var(--success);color:var(--success)}

/* Alerts */
.alerts-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0}
.alert-item{padding:10px 12px;border:1px solid var(--border-subtle);border-radius:6px;background:rgba(0,0,0,0.1);transition:background .15s}
.alert-item:hover{background:rgba(0,0,0,0.2)}
.alert-item.severity-Critical,.alert-item.severity-High{border-left:3px solid var(--danger);background:var(--danger-dim)}
.alert-item.severity-Medium{border-left:3px solid var(--warning);background:var(--warning-dim)}
.alert-item.severity-Low{border-left:3px solid var(--success);background:var(--success-dim)}
.alert-meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:#64748b;margin-bottom:4px}
.alert-threat{font-size:11.5px;font-weight:600;color:#fff}

/* AI Analyzer */
.ai-analyzer-input{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border-subtle);color:#f1f5f9;padding:10px 12px;font-family:var(--font-mono);font-size:12px;border-radius:var(--radius);resize:none;transition:border-color .15s;flex-shrink:0}
.ai-analyzer-input:focus{outline:none;border-color:var(--cyan)}
.ai-result{margin-top:12px;padding:14px;background:rgba(0,0,0,0.15);border:1px solid var(--border-subtle);border-left:3px solid var(--purple);border-radius:var(--radius);font-family:var(--font-mono);font-size:11px;flex-shrink:0;overflow-y:auto}
.severity-badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase}
.severity-badge.Critical,.severity-badge.High{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}
.severity-badge.Medium{background:var(--warning-dim);color:var(--warning);border:1px solid rgba(245,158,11,0.3)}
.severity-badge.Low{background:var(--success-dim);color:var(--success);border:1px solid rgba(16,185,129,0.3)}

/* Scan */
.action-center{flex:1;min-height:0}
.scan-btn-wrap{flex-shrink:0}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px;transition:width .3s}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:#64748b;font-family:var(--font-mono);font-size:11px;padding:20px}
.empty-state i{font-size:28px;opacity:.3}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s step-end infinite}

/* Lockdown Banner */
.lockdown-banner{background:linear-gradient(90deg,rgba(239,68,68,0.15),rgba(239,68,68,0.08));border-bottom:1px solid rgba(239,68,68,0.3);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--danger);letter-spacing:.5px;flex-shrink:0}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-void)}
.login-panel{max-width:420px;width:100%;padding:40px;gap:0}
.login-icon{width:60px;height:60px;border:2px solid var(--cyan);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:24px;margin:0 auto 20px}
.login-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:2px;color:#fff;text-align:center;margin-bottom:6px}
.login-sub{font-family:var(--font-mono);font-size:11px;color:#64748b;text-align:center;margin-bottom:28px;letter-spacing:.5px}
.login-form{display:flex;flex-direction:column;gap:14px}
.input-group{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,0.2);border:1px solid var(--border-subtle);border-radius:var(--radius);transition:border-color .15s}
.input-group:focus-within{border-color:var(--cyan)}
.input-group i{color:#64748b;font-size:13px;flex-shrink:0}
.login-input{background:transparent;border:none;color:#f1f5f9;font-family:var(--font-mono);font-size:12px;width:100%}
.login-input:focus{outline:none}
.login-btn{background:var(--blue-electric);color:#fff;border:none;padding:12px;font-size:12px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:background .15s;border-radius:var(--radius);font-weight:600;margin-top:6px}
.login-btn:hover:not(:disabled){background:#2563eb}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-error{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);color:var(--danger);padding:8px 12px;border-radius:6px;font-family:var(--font-mono);font-size:11px;text-align:center}
.login-warning{font-family:var(--font-mono);font-size:9px;color:#64748b;text-align:center;padding-top:14px;border-top:1px solid var(--border-subtle);margin-top:8px;letter-spacing:.5px}

/* Admin Panel */
.admin-layout{display:flex;height:100vh;overflow:hidden}
.admin-sidebar{width:220px;background:var(--bg-surface);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;flex-shrink:0}
.admin-sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border-subtle)}
.admin-sidebar-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:#fff;letter-spacing:1px}
.admin-sidebar-sub{font-family:var(--font-mono);font-size:9px;color:#64748b;margin-top:2px}
.admin-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;color:#64748b;font-size:11.5px;font-weight:500;transition:all .15s;border:1px solid transparent}
.admin-nav-item:hover{color:#fff;background:rgba(255,255,255,0.04)}
.admin-nav-item.active{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(56,189,248,0.15)}
.admin-nav-item i{font-size:12px;width:14px;text-align:center}
.admin-main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius)}
.stat-box{background:rgba(0,0,0,0.15);border:1px solid var(--border-subtle);border-radius:6px;padding:14px;transition:border-color .15s}
.stat-box:hover{border-color:var(--border-mid)}
.stat-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#64748b;font-family:var(--font-mono);margin-bottom:6px}
.stat-value{font-family:var(--font-mono);font-size:22px;font-weight:600;color:#fff}
.stat-sub{font-size:9px;color:#64748b;font-family:var(--font-mono);margin-top:4px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-subtle)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:12px;font-weight:500}
.toggle-desc{font-size:10px;color:#64748b;font-family:var(--font-mono);margin-top:2px}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.1);border-radius:22px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked + .toggle-slider{background:var(--cyan)}
input:checked + .toggle-slider:before{transform:translateX(18px)}
.rule-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,0,0,0.12);border:1px solid var(--border-subtle);border-radius:6px}
.rule-name{flex:1;font-size:11.5px;font-weight:500}
.rule-match{font-family:var(--font-mono);font-size:9.5px;color:#64748b;margin-top:2px}
.rule-action-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.rule-action-badge.block{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}
.rule-action-badge.alert-only{background:var(--warning-dim);color:var(--warning);border:1px solid rgba(245,158,11,0.3)}
.rule-action-badge.allow{background:var(--success-dim);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.audit-log-window{flex:1;overflow-y:auto;font-family:var(--font-mono);font-size:10.5px;background:rgba(0,0,0,0.2);border-radius:6px;padding:12px}
.audit-entry{margin-bottom:6px;line-height:1.6}
.audit-time{color:#64748b;margin-right:6px}
.audit-user{color:var(--cyan);margin-right:8px}
.ip-tag{display:inline-flex;align-items:center;gap:6px;background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);color:var(--danger);font-family:var(--font-mono);font-size:9.5px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.ip-tag:hover{background:rgba(239,68,68,0.2)}
.input-field{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border-subtle);color:#f1f5f9;padding:8px 12px;font-family:var(--font-mono);font-size:12px;border-radius:6px;transition:border-color .15s}
.input-field:focus{outline:none;border-color:var(--cyan)}
.inner-tabs{display:flex;gap:4px;background:rgba(0,0,0,0.15);border:1px solid var(--border-subtle);border-radius:6px;padding:3px;flex-shrink:0}
.inner-tab{background:transparent;border:none;color:#64748b;font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.inner-tab.active{color:var(--cyan);background:var(--cyan-dim)}
.hop-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:rgba(0,0,0,0.12);border-radius:6px;border:1px solid var(--border-subtle)}
.hop-num{font-family:var(--font-mono);font-size:10px;color:#64748b;width:30px}
.hop-ip{font-family:var(--font-mono);font-size:11px;color:var(--cyan);width:120px}
.hop-name{font-size:10px;color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hop-rtt{font-family:var(--font-mono);font-size:10px;color:var(--success);white-space:nowrap}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API_BASE = '';

// ── Hash Router ──────────────────────────────────────────
function useRoute() {
  const getHash = () => window.location.hash.replace('#','') || '/dashboard';
  const [route, setRoute] = useState(getHash);
  useEffect(() => {
    const handler = () => setRoute(getHash());
    window.addEventListener('hashchange', handler);
    if (!window.location.hash) window.location.hash = '/dashboard';
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return route;
}
const go = (path) => { window.location.hash = path; };

function NavLink({ to, children }) {
  const route = useRoute();
  const isActive = route === to || (to !== '/dashboard' && route.startsWith(to));
  return (
    <a href={'#'+to} className={'nav-tab'+(isActive?' active':'')}
       onClick={e => { e.preventDefault(); go(to); }}>
      {children}
    </a>
  );
}

// ── CSV Export Helpers ────────────────────────────────────
const exportCSV = (data, headers, filename) => {
  if (!data.length) return;
  const rows = [headers.join(','), ...data.map(r => r.map(v => `"${v}"`).join(','))];
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURI(rows.join('\n'));
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
};

// ── Live Stream Widget ────────────────────────────────────
const LiveStreamWidget = ({ packets }) => {
  const [paused, setPaused] = useState(false);
  const [threatsOnly, setThreatsOnly] = useState(false);
  const [displayed, setDisplayed] = useState([]);
  useEffect(() => { if (!paused) setDisplayed(packets); }, [packets, paused]);
  const filtered = displayed.filter(p => threatsOnly ? p.suspicious : true);
  const threatCnt = displayed.filter(p => p.suspicious).length;
  return (
    <div className="glass-panel" style={{flex:1,minHeight:0}}>
      <div className="panel-header flex-between" style={{marginBottom:'10px'}}>
        <span><i className="fa-solid fa-satellite-dish"></i>&nbsp; Live Packet Stream</span>
        <span className="panel-badge" style={{color:threatCnt>0?'var(--danger)':'var(--success)',borderColor:'currentColor'}}>
          {threatCnt>0?`${threatCnt} THREATS`:'CLEAR'}
        </span>
      </div>
      <div className="stream-controls">
        <button className={`cyber-btn-sm ${paused?'danger active':''}`} onClick={()=>setPaused(p=>!p)}>
          <i className={`fa-solid fa-${paused?'play':'pause'}`}></i>&nbsp;{paused?'RESUME':'PAUSE'}
        </button>
        <button className={`cyber-btn-sm ${threatsOnly?'active':''}`} onClick={()=>setThreatsOnly(s=>!s)}>
          <i className="fa-solid fa-filter"></i>&nbsp;{threatsOnly?'THREATS':'ALL'}
        </button>
        <button className="cyber-btn-sm" onClick={() => exportCSV(
          filtered.map(p=>[p.timestamp,p.source,p.destination,p.protocol,p.suspicious?'SUSPICIOUS':'OK',p.severity||'',p.threat_type||'']),
          ['Time','Source','Destination','Protocol','Status','Severity','ThreatType'],
          'cybershield_packets.csv'
        )}>
          <i className="fa-solid fa-file-csv"></i>&nbsp;CSV
        </button>
      </div>
      <div className="stream-meta">
        <span>Visible: <span style={{color:'var(--cyan)'}}>{filtered.length}</span></span>
        <span>Threats: <span style={{color:threatCnt>0?'var(--danger)':'var(--success)'}}>{threatCnt}</span></span>
      </div>
      <div className="stream-header"><span>TIME</span><span>SOURCE</span><span>DEST</span><span>PROTO</span></div>
      <div className="packet-stream">
        {filtered.length===0
          ? <div className="empty-state"><i className="fa-solid fa-satellite-dish"></i><span>{threatsOnly?'No threats detected':'Awaiting packet stream...'}</span></div>
          : filtered.map((p,i) => (
            <div key={i} className={`packet-item ${p.suspicious?(p.severity==='High'||p.severity==='Critical'?'malicious':'suspicious'):''}`}>
              <span>{p.timestamp}</span>
              <span title={p.source}>{p.source}</span>
              <span title={p.destination}>{p.destination}</span>
              <span><span className={`proto-badge proto-${p.protocol}`}>{p.protocol}</span></span>
            </div>
          ))
        }
      </div>
    </div>
  );
};

// ── Network Graph Widget ──────────────────────────────────
const NetworkGraphWidget = ({ trafficData }) => {
  const max = Math.max(...trafficData.map(d=>d.volume), 1);
  const cls = d => d.volume>80?'threat':d.volume>50?'suspicious':'normal';
  return (
    <div className="glass-panel" style={{flex:1,minHeight:0}}>
      <div className="panel-header">
        <i className="fa-solid fa-chart-line"></i>&nbsp; Network Traffic Load
        <span className="panel-badge" style={{color:'rgba(200,230,245,0.4)',borderColor:'rgba(200,230,245,0.15)',fontSize:'9px'}}>LIVE &middot; {trafficData.length} SAMPLES</span>
      </div>
      <div className="graph-wrapper">
        <div className="graph-container">
          {[25,50,75].map(pct=><div key={pct} className="graph-gridline" style={{bottom:`${pct}%`}}/>)}
          <div className="graph-axis-y"/><div className="graph-axis-x"/>
          {trafficData.map((d,i)=><div key={i} className={`graph-bar ${cls(d)}`} style={{height:`${(d.volume/max)*95}%`}} title={`Vol: ${d.volume}`}/>)}
        </div>
        <div className="graph-legend">
          <span><span className="legend-dot" style={{background:'var(--cyan)'}}></span>Normal</span>
          <span><span className="legend-dot" style={{background:'var(--warning)'}}></span>Suspicious</span>
          <span><span className="legend-dot" style={{background:'var(--danger)'}}></span>Threat</span>
        </div>
      </div>
    </div>
  );
};

// ── Deep Scan Widget ──────────────────────────────────────
const DeepScanWidget = ({ isScanning, scanProgress, scanStatus, scanThreats, startDeepScan }) => {
  const [executed, setExecuted] = useState({});
  const handleExecute = t => {
    if (executed[t.name]) return;
    setExecuted(p=>({...p,[t.name]:'running'}));
    setTimeout(()=>setExecuted(p=>({...p,[t.name]:'done'})),1500);
  };
  return (
    <div className="glass-panel action-center">
      <div className="panel-header"><i className="fa-solid fa-bolt"></i>&nbsp; Active Defense Grid</div>
      <div className="scan-btn-wrap">
        <button className={`cyber-btn ${isScanning?'scanning':''}`} onClick={startDeepScan} disabled={isScanning}>
          {isScanning?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp; SCANNING...</>:<><i className="fa-solid fa-shield-virus"></i>&nbsp; Initiate Deep Threat Scan</>}
        </button>
      </div>
      {isScanning && (
        <div style={{marginTop:'12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--cyan)',marginBottom:'6px'}}>
            <span style={{maxWidth:'75%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scanStatus||'Initializing...'}</span>
            <span style={{fontWeight:600}}>{scanProgress}%</span>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${scanProgress}%`}}/></div>
        </div>
      )}
      {!isScanning&&scanStatus&&<div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--cyan)',padding:'8px 0'}}><i className="fa-solid fa-check-circle" style={{marginRight:'6px',color:'var(--success)'}}></i>{scanStatus}</div>}
      {scanThreats.length>0 && (
        <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',marginTop:'10px',overflow:'hidden'}}>
          <div style={{fontFamily:'var(--font-display)',fontSize:'10px',fontWeight:600,letterSpacing:'1px',color:'var(--danger)',textTransform:'uppercase',marginBottom:'8px',flexShrink:0}}>
            <i className="fa-solid fa-radiation" style={{marginRight:'6px'}}></i>{scanThreats.length} Threat{scanThreats.length!==1?'s':''} Detected
          </div>
          <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:'8px'}}>
            {scanThreats.map((t,i)=>(
              <div key={i} className={`threat-item ${t.severity}`}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="threat-name">{t.name}</div>
                  <div className="threat-action"><i className="fa-solid fa-arrow-right" style={{marginRight:'4px',fontSize:'9px'}}></i>{t.action}</div>
                </div>
                <button className={`execute-btn${executed[t.name]==='done'?' done':''}`} onClick={()=>handleExecute(t)} disabled={!!executed[t.name]}>
                  {executed[t.name]==='running'?<><i className="fa-solid fa-spinner fa-spin" style={{marginRight:'4px'}}></i>RUNNING</>:executed[t.name]==='done'?<><i className="fa-solid fa-check" style={{marginRight:'4px'}}></i>DONE</>:'EXECUTE'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
      {!isScanning&&scanThreats.length===0&&!scanStatus&&(
        <div className="empty-state" style={{flex:1}}><i className="fa-solid fa-shield-halved"></i><span>System secure — no threats detected</span></div>
      )}
    </div>
  );
};

// ── Admin Login ───────────────────────────────────────────
const AdminLogin = ({ onLoginSuccess, isAuthenticated }) => {
  useEffect(() => { if (isAuthenticated) go('/admin/panel'); }, [isAuthenticated]);
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const handleLogin = async e => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const res = await fetch(`${API_BASE}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const data = await res.json();
      if (res.ok && data.success) { onLoginSuccess(); go('/admin/panel'); }
      else setError(data.error||'Authentication failed.');
    } catch { setError('Cannot reach backend server.'); }
    finally { setLoading(false); }
  };
  return (
    <div className="login-wrap fade-in">
      <div className="glass-panel login-panel">
        <div className="login-icon"><i className="fa-solid fa-lock"></i></div>
        <div className="login-title">RESTRICTED ACCESS</div>
        <div className="login-sub">Administrative credentials required.</div>
        <form className="login-form" onSubmit={handleLogin}>
          <div className="input-group"><i className="fa-solid fa-user"></i><input type="text" className="login-input" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} required autoComplete="username"/></div>
          <div className="input-group"><i className="fa-solid fa-key"></i><input type="password" className="login-input" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required autoComplete="current-password"/></div>
          {error&&<div className="login-error"><i className="fa-solid fa-circle-exclamation" style={{marginRight:'6px'}}></i>{error}</div>}
          <button type="submit" className="login-btn" disabled={loading}>{loading?<><i className="fa-solid fa-spinner fa-spin" style={{marginRight:'6px'}}></i>Authenticating...</>:'Secure Login'}</button>
        </form>
        <div className="login-warning"><i className="fa-solid fa-triangle-exclamation" style={{marginRight:'4px'}}></i>Authorized personnel only. All access is logged and monitored.</div>
      </div>
    </div>
  );
};

// ── Admin Panel ───────────────────────────────────────────
const AdminPanel = ({ systemStats, onLogout, config, blocklist, fetchConfig }) => {
  const [section, setSection] = useState('overview');
  const [banIp, setBanIp] = useState('');
  const [history, setHistory] = useState([]);
  const [portTarget, setPortTarget] = useState('127.0.0.1');
  const [portResults, setPortResults] = useState([]);
  const [portScanning, setPortScanning] = useState(false);
  const [rules, setRules] = useState([]);
  const [traceIp, setTraceIp] = useState('');
  const [traceResult, setTraceResult] = useState(null);
  const [tracing, setTracing] = useState(false);
  const [newRuleName, setNewRuleName] = useState('');
  const [newRuleMatch, setNewRuleMatch] = useState('');
  const [newRuleAction, setNewRuleAction] = useState('block');
  const [auditLog, setAuditLog] = useState([
    {time:new Date().toTimeString().split(' ')[0],user:'system',act:'Admin panel initialized'},
    {time:new Date().toTimeString().split(' ')[0],user:'system',act:'Security modules loaded'},
  ]);
  const addAudit = (user,act) => setAuditLog(p=>[...p,{time:new Date().toTimeString().split(' ')[0],user,act}]);

  useEffect(()=>{
    fetch(`${API_BASE}/api/admin/rules`).then(r=>r.json()).then(d=>setRules(d.rules||[])).catch(()=>{});
    fetch(`${API_BASE}/api/history`).then(r=>r.json()).then(d=>setHistory(d.alerts||[])).catch(()=>{});
  },[]);

  const toggleConfig = async (key, val) => {
    try {
      const res = await fetch(`${API_BASE}/api/admin/config`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[key]:val})});
      if (res.ok) { fetchConfig(); addAudit('admin',`Toggled ${key} to ${val}`); }
    } catch {}
  };

  const banIpAction = async (ip) => {
    if (!ip.trim()) return;
    try {
      const res = await fetch(`${API_BASE}/api/admin/blocklist`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:ip.trim()})});
      if (res.ok) { fetchConfig(); addAudit('admin',`Banned IP: ${ip.trim()}`); setBanIp(''); }
    } catch {}
  };

  const unbanIp = async (ip) => {
    try {
      const res = await fetch(`${API_BASE}/api/admin/blocklist`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});
      if (res.ok) { fetchConfig(); addAudit('admin',`Unbanned IP: ${ip}`); }
    } catch {}
  };

  const saveRule = async () => {
    if (!newRuleName.trim()||!newRuleMatch.trim()) return;
    try {
      const res = await fetch(`${API_BASE}/api/admin/rules`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newRuleName,match:newRuleMatch,action:newRuleAction,active:true})});
      const d = await res.json();
      if (d.rules) { setRules(d.rules); setNewRuleName(''); setNewRuleMatch(''); addAudit('admin',`Created rule: ${newRuleName}`); }
    } catch {}
  };

  const toggleRule = async (id, active) => {
    try {
      const res = await fetch(`${API_BASE}/api/admin/rules/toggle`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,active})});
      const d = await res.json(); if (d.rules) setRules(d.rules);
    } catch {}
  };

  const deleteRule = async (id) => {
    try {
      const res = await fetch(`${API_BASE}/api/admin/rules/${id}`,{method:'DELETE'});
      const d = await res.json(); if (d.rules) setRules(d.rules);
    } catch {}
  };

  const runTrace = async () => {
    if (!traceIp.trim()) return;
    setTracing(true); setTraceResult(null);
    try {
      const res = await fetch(`${API_BASE}/api/admin/trace`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:traceIp})});
      const d = await res.json(); setTraceResult(d); addAudit('admin',`Traced IP: ${traceIp}`);
    } catch {} finally { setTracing(false); }
  };

  const runPortScan = async () => {
    setPortScanning(true); setPortResults([]);
    try {
      const res = await fetch(`${API_BASE}/api/portscan`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:portTarget})});
      const d = await res.json(); setPortResults(d.results||[]); addAudit('admin',`Port scan: ${portTarget}`);
    } catch {} finally { setPortScanning(false); }
  };

  const navItems = [
    {id:'overview',icon:'fa-gauge-high',label:'Overview'},
    {id:'firewall',icon:'fa-shield-halved',label:'Firewall & Rules'},
    {id:'blocklist',icon:'fa-ban',label:'IP Blocklist'},
    {id:'tools',icon:'fa-wrench',label:'Diagnostic Tools'},
    {id:'modules',icon:'fa-sliders',label:'Module Control'},
    {id:'logs',icon:'fa-terminal',label:'Audit Log'},
    {id:'simulator',icon:'fa-vial',label:'Attack Simulator'},
  ];

  return (
    <div className="admin-layout fade-in">
      <div className="admin-sidebar">
        <div className="admin-sidebar-header">
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <div className="logo-icon" style={{width:'32px',height:'32px',fontSize:'14px'}}><i className="fa-solid fa-shield-halved"></i></div>
            <div>
              <div className="admin-sidebar-title">CYBERSHIELD</div>
              <div className="admin-sidebar-sub">Command &amp; Control</div>
            </div>
          </div>
        </div>
        <div className="admin-nav">
          {navItems.map(n=>(
            <div key={n.id} className={`admin-nav-item${section===n.id?' active':''}`} onClick={()=>setSection(n.id)}>
              <i className={`fa-solid ${n.icon}`}></i>{n.label}
            </div>
          ))}
        </div>
        <div style={{padding:'12px 8px',borderTop:'1px solid var(--border-subtle)',display:'flex',flexDirection:'column',gap:'6px'}}>
          <div className="admin-nav-item" onClick={()=>go('/dashboard')}>
            <i className="fa-solid fa-gauge-high"></i>Back to Dashboard
          </div>
          <div className="admin-nav-item" style={{color:'var(--danger)'}} onClick={()=>{onLogout();go('/admin/login');}}>
            <i className="fa-solid fa-right-from-bracket"></i>Logout
          </div>
        </div>
      </div>

      <div className="admin-main">
        {config.emergency_lockdown && (
          <div className="lockdown-banner">
            <span><i className="fa-solid fa-triangle-exclamation"></i>&nbsp; <strong>CRITICAL:</strong> EMERGENCY LOCKDOWN ACTIVE — All external connections blocked</span>
            <span style={{fontSize:'9px'}}>DEFCON 1</span>
          </div>
        )}

        {/* Overview */}
        {section==='overview' && (
          <>
            <div className="glass-panel">
              <div className="panel-header"><i className="fa-solid fa-gauge-high"></i>&nbsp; System Overview</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px'}}>
                {[
                  {label:'CPU Usage',value:systemStats?`${systemStats.cpu_percent?.toFixed(1)}%`:'—',sub:'processor load'},
                  {label:'Memory',value:systemStats?`${systemStats.memory_percent?.toFixed(1)}%`:'—',sub:'ram utilization'},
                  {label:'Disk',value:systemStats?`${systemStats.disk_percent?.toFixed(1)}%`:'—',sub:'storage'},
                  {label:'Connections',value:systemStats?systemStats.net_connections:'—',sub:'active network'},
                ].map((s,i)=>(
                  <div key={i} className="stat-box">
                    <div className="stat-label">{s.label}</div>
                    <div className="stat-value">{s.value}</div>
                    <div className="stat-sub">{s.sub}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="glass-panel">
              <div className="panel-header"><i className="fa-solid fa-list-check"></i>&nbsp; Recent Alert History</div>
              <div style={{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'300px',overflowY:'auto'}}>
                {history.slice(0,10).map((h,i)=>(
                  <div key={i} className={`alert-item severity-${h.severity}`}>
                    <div className="alert-meta"><span>{h.timestamp}</span><span>{h.category}</span></div>
                    <div className="alert-threat">{h.title}</div>
                  </div>
                ))}
                {history.length===0&&<div className="empty-state"><i className="fa-solid fa-inbox"></i><span>No history available</span></div>}
              </div>
            </div>
          </>
        )}

        {/* Firewall Rules */}
        {section==='firewall' && (
          <div className="glass-panel" style={{flex:1}}>
            <div className="panel-header"><i className="fa-solid fa-shield-halved"></i>&nbsp; IDS / Firewall Rules</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto auto',gap:'8px',marginBottom:'14px',flexShrink:0}}>
              <input className="input-field" placeholder="Rule name" value={newRuleName} onChange={e=>setNewRuleName(e.target.value)}/>
              <input className="input-field" placeholder="Match expression (e.g. dst_port == 4444)" value={newRuleMatch} onChange={e=>setNewRuleMatch(e.target.value)}/>
              <select className="input-field" style={{width:'120px'}} value={newRuleAction} onChange={e=>setNewRuleAction(e.target.value)}>
                <option value="block">Block</option>
                <option value="alert-only">Alert Only</option>
                <option value="allow">Allow</option>
              </select>
              <button className="cyber-btn-sm active" onClick={saveRule}><i className="fa-solid fa-plus"></i>&nbsp;Add Rule</button>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'8px',overflowY:'auto',flex:1}}>
              {rules.map(r=>(
                <div key={r.id} className="rule-row">
                  <div style={{flex:1,minWidth:0}}>
                    <div className="rule-name" style={{opacity:r.active?1:0.4}}>{r.name}</div>
                    <div className="rule-match">{r.match}</div>
                  </div>
                  <span className={`rule-action-badge ${r.action}`}>{r.action}</span>
                  <label className="toggle-switch">
                    <input type="checkbox" checked={r.active} onChange={e=>toggleRule(r.id,e.target.checked)}/>
                    <span className="toggle-slider"></span>
                  </label>
                  <button className="cyber-btn-sm danger" onClick={()=>deleteRule(r.id)}><i className="fa-solid fa-trash"></i></button>
                </div>
              ))}
              {rules.length===0&&<div className="empty-state"><i className="fa-solid fa-shield"></i><span>No rules defined yet</span></div>}
            </div>
          </div>
        )}

        {/* Blocklist */}
        {section==='blocklist' && (
          <div className="glass-panel" style={{flex:1}}>
            <div className="panel-header"><i className="fa-solid fa-ban"></i>&nbsp; IP Blocklist</div>
            <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexShrink:0}}>
              <input className="input-field" placeholder="Enter IP to ban (e.g. 1.2.3.4)" value={banIp} onChange={e=>setBanIp(e.target.value)}/>
              <button className="cyber-btn-sm danger active" onClick={()=>banIpAction(banIp)}><i className="fa-solid fa-ban"></i>&nbsp;Ban IP</button>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',overflowY:'auto',flex:1,alignContent:'flex-start'}}>
              {blocklist.length===0
                ? <div className="empty-state" style={{flex:1,width:'100%'}}><i className="fa-solid fa-check-circle"></i><span>No IPs blocked</span></div>
                : blocklist.map((ip,i)=>(
                  <span key={i} className="ip-tag" onClick={()=>unbanIp(ip)}>
                    {ip}&nbsp;<i className="fa-solid fa-xmark" style={{opacity:.6}}></i>
                  </span>
                ))
              }
            </div>
          </div>
        )}

        {/* Diagnostic Tools */}
        {section==='tools' && (
          <div className="glass-panel" style={{flex:1}}>
            <div className="panel-header"><i className="fa-solid fa-wrench"></i>&nbsp; Diagnostic Tools</div>
            <div className="inner-tabs" style={{marginBottom:'16px'}}>
              {['port','trace'].map(t=>(
                <button key={t} className={`inner-tab${section==='tools'&&portResults.length>0&&t==='port'?'':''} ${t==='port'&&portResults.length>=0&&!traceResult?'active':t==='trace'&&traceResult?'active':''}`}
                  onClick={()=>{if(t==='port'){setTraceResult(null);}else{setPortResults([]);}}}>
                  {t==='port'?'Port Scanner':'IP Traceroute'}
                </button>
              ))}
            </div>
            {!traceResult && (
              <>
                <div style={{display:'flex',gap:'8px',marginBottom:'12px',flexShrink:0}}>
                  <input className="input-field" placeholder="Target host or IP" value={portTarget} onChange={e=>setPortTarget(e.target.value)}/>
                  <button className="cyber-btn-sm active" onClick={runPortScan} disabled={portScanning}>
                    {portScanning?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp;Scanning</>:<><i className="fa-solid fa-radar"></i>&nbsp;Scan Ports</>}
                  </button>
                </div>
                {portResults.length>0 && (
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',overflowY:'auto'}}>
                    {portResults.map((p,i)=>(
                      <div key={i} className="stat-box" style={{padding:'10px'}}>
                        <div className="stat-label">{p.service}</div>
                        <div style={{fontFamily:'var(--font-mono)',fontSize:'13px',fontWeight:600,color:p.state==='open'?'var(--success)':p.state==='filtered'?'var(--warning)':'#64748b'}}>
                          {p.port} / {p.state.toUpperCase()}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {portResults.length===0&&!portScanning&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-radar"></i><span>Enter a target and click Scan Ports</span></div>}
              </>
            )}
            {!portResults.length && (
              <>
                <div style={{display:'flex',gap:'8px',marginBottom:'12px',flexShrink:0}}>
                  <input className="input-field" placeholder="Target IP to trace" value={traceIp} onChange={e=>setTraceIp(e.target.value)}/>
                  <button className="cyber-btn-sm active" onClick={runTrace} disabled={tracing}>
                    {tracing?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp;Tracing</>:<><i className="fa-solid fa-route"></i>&nbsp;Trace Route</>}
                  </button>
                </div>
                {traceResult && (
                  <div style={{display:'flex',flexDirection:'column',gap:'8px',overflowY:'auto',flex:1}}>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'#64748b',marginBottom:'4px'}}>
                      Target: {traceResult.target} &nbsp;|&nbsp; ASN: {traceResult.asn} &nbsp;|&nbsp; {traceResult.org}
                    </div>
                    {traceResult.hops?.map((h,i)=>(
                      <div key={i} className="hop-row">
                        <span className="hop-num">HOP {h.hop}</span>
                        <span className="hop-ip">{h.ip}</span>
                        <span className="hop-name">{h.name}</span>
                        <span className="hop-rtt">{h.rtt}</span>
                        <span style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'#64748b'}}>{h.geo}</span>
                      </div>
                    ))}
                  </div>
                )}
                {!traceResult&&!tracing&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-route"></i><span>Enter an IP and click Trace Route</span></div>}
              </>
            )}
          </div>
        )}

        {/* Module Control */}
        {section==='modules' && (
          <div className="glass-panel" style={{flex:1}}>
            <div className="panel-header"><i className="fa-solid fa-sliders"></i>&nbsp; Security Module Control</div>
            <div style={{display:'flex',flexDirection:'column',flex:1}}>
              {[
                {key:'sniffing_paused',label:'Packet Sniffer',desc:'Toggle live network packet capture (inverts: true = paused)',invert:true},
                {key:'ai_enabled',label:'AI Threat Analyzer',desc:'Enable AI-assisted threat assessment engine'},
                {key:'honeypot_active',label:'Honeypot Trap',desc:'Deploy honeypot decoys to lure and identify attackers'},
                {key:'reverse_tracing_active',label:'Reverse IP Tracing',desc:'Automatically trace and geolocate suspicious source IPs'},
                {key:'db_encryption_active',label:'Database Encryption',desc:'Enable AES-256 payload field isolation for stored alerts'},
              ].map(m=>(
                <div key={m.key} className="toggle-row">
                  <div>
                    <div className="toggle-label">{m.label}</div>
                    <div className="toggle-desc">{m.desc}</div>
                  </div>
                  <label className="toggle-switch">
                    <input type="checkbox" checked={m.invert ? !config[m.key] : config[m.key]}
                      onChange={e=>toggleConfig(m.key, m.invert ? !e.target.checked : e.target.checked)}/>
                    <span className="toggle-slider"></span>
                  </label>
                </div>
              ))}
              <div className="toggle-row">
                <div>
                  <div className="toggle-label" style={{color:'var(--danger)'}}>Emergency Lockdown</div>
                  <div className="toggle-desc">Block ALL external IPs immediately. Activates DEFCON 1 protocol.</div>
                </div>
                <label className="toggle-switch">
                  <input type="checkbox" checked={config.emergency_lockdown} onChange={e=>toggleConfig('emergency_lockdown',e.target.checked)}/>
                  <span className="toggle-slider" style={config.emergency_lockdown?{background:'var(--danger)'}:{}}></span>
                </label>
              </div>
            </div>
          </div>
        )}

        {/* Audit Log */}
        {section==='logs' && (
          <div className="glass-panel" style={{flex:1}}>
            <div className="panel-header"><i className="fa-solid fa-terminal"></i>&nbsp; System Audit Log</div>
            <div className="audit-log-window" style={{flex:1}}>
              {auditLog.map((l,i)=>(
                <div key={i} className="audit-entry">
                  <span className="audit-time">[{l.time}]</span>
                  <span className="audit-user">{l.user}@cybershield:~$</span>
                  <span>{l.act}</span>
                </div>
              ))}
              <div className="audit-entry">
                <span className="audit-time">[{new Date().toTimeString().split(' ')[0]}]</span>
                <span className="audit-user">admin@cybershield:~$</span>
                <span className="blink">_</span>
              </div>
            </div>
          </div>
        )}

        {/* Attack Simulator */}
        {section==='simulator' && (
          <div className="glass-panel" style={{flex:1}}>
            <div className="panel-header"><i className="fa-solid fa-vial"></i>&nbsp; Attack Simulation Console</div>
            <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'14px',fontFamily:'var(--font-mono)'}}>
              Generate synthetic security events to test the SOC dashboard, AI analyzer, and firewalls.
            </p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              {[
                {type:'ddos',title:'DDoS SYN Flood',desc:'Injects 15 rapid TCP requests from diverse external IPs.',icon:'fa-wind',btn:'Flood Network'},
                {type:'bruteforce',title:'SSH Brute Force',desc:'Simulates repeated failed root logins from a single IP.',icon:'fa-key',btn:'Trigger Auth Alert'},
                {type:'sqli',title:'SQL Injection',desc:'Injects HTTP request with SQL payload (OR 1=1).',icon:'fa-database',btn:'Inject Payload'},
                {type:'malware',title:'Malware C2 Beacon',desc:'Triggers callback from local system to known C2 server.',icon:'fa-skull',btn:'Beacon C2 Server'},
              ].map(s=>(
                <div key={s.type} className="stat-box" style={{display:'flex',flexDirection:'column',gap:'6px',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:'11.5px',color:'#fff',display:'flex',alignItems:'center',gap:'8px'}}>
                      <i className={`fa-solid ${s.icon}`} style={{color:'var(--warning)'}}></i>{s.title}
                    </div>
                    <div style={{fontSize:'10px',color:'#64748b',marginTop:'4px',fontFamily:'var(--font-mono)'}}>{s.desc}</div>
                  </div>
                  <button className="cyber-btn-sm active" style={{marginTop:'8px',width:'100%',textAlign:'center'}} onClick={async()=>{
                    try{await fetch(`${API_BASE}/api/admin/simulate_attack`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:s.type})});}catch{}
                  }}>
                    {s.btn}
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Dashboard View ────────────────────────────────────────
const DashboardView = ({ packets,alerts,systemStatus,systemStats,isScanning,scanProgress,scanStatus,scanThreats,aiInput,setAiInput,handleAiAnalysis,isAnalyzing,aiResult,trafficData,clock,startDeepScan,config,blocklist,fetchConfig }) => {
  const threatCount = alerts.filter(a=>a.severity==='High'||a.severity==='Critical').length;
  const isConnected = systemStatus.includes('ONLINE');

  const banIp = async (ip) => {
    try {
      const res = await fetch(`${API_BASE}/api/admin/blocklist`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});
      if (res.ok) fetchConfig();
    } catch {}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {config.emergency_lockdown && (
        <div className="lockdown-banner">
          <span><i className="fa-solid fa-triangle-exclamation"></i>&nbsp; <strong>CRITICAL ALERT:</strong> SECURE ENGINE IN EMERGENCY LOCKDOWN — ALL EXTERNAL ACCESS BLOCKED</span>
          <span style={{fontSize:'9px',opacity:.8}}>DEFCON 1</span>
        </div>
      )}
      <div className="dashboard-layout fade-in" style={{height:config.emergency_lockdown?'calc(100vh - 40px)':'100vh'}}>
        <header className="header">
          <div className="logo-container">
            <div className="logo-icon"><i className="fa-solid fa-shield-halved"></i></div>
            <div><div style={{display:'flex',alignItems:'baseline',gap:'8px'}}><span className="logo-text">CYBERSHIELD</span><span className="logo-version">SOC.02</span></div></div>
          </div>
          <div className="header-center">
            <div className="header-stat"><span className="header-stat-value">{clock}</span><span className="header-stat-label">System Time</span></div>
            <div className="header-divider"/>
            <div className="header-stat"><span className="header-stat-value" style={{color:threatCount>0?'var(--danger)':'var(--success)'}}>{threatCount}</span><span className="header-stat-label">Active Threats</span></div>
            <div className="header-divider"/>
            <div className="header-stat"><span className="header-stat-value">{packets.length}</span><span className="header-stat-label">Packets Buffered</span></div>
            <div className="header-divider"/>
            <nav className="nav-tabs">
              <NavLink to="/dashboard"><i className="fa-solid fa-gauge-high"></i>&nbsp;Dashboard</NavLink>
              <NavLink to="/admin/panel"><i className="fa-solid fa-user-shield"></i>&nbsp;Admin Portal</NavLink>
            </nav>
          </div>
          <div className="system-status">
            <div className="status-indicator" style={{borderColor:isConnected?'rgba(16,185,129,0.2)':'rgba(239,68,68,0.2)',background:isConnected?'rgba(16,185,129,0.05)':'rgba(239,68,68,0.05)'}}>
              <div className="status-dot" style={{background:isConnected?'var(--success)':'var(--danger)'}}/>
              <span className="status-text" style={{color:isConnected?'var(--success)':'var(--danger)'}}>{isConnected?'ONLINE':'OFFLINE'}</span>
            </div>
          </div>
        </header>
        <div className="left-col"><LiveStreamWidget packets={packets}/></div>
        <div className="center-col">
          <NetworkGraphWidget trafficData={trafficData}/>
          <DeepScanWidget isScanning={isScanning} scanProgress={scanProgress} scanStatus={scanStatus} scanThreats={scanThreats} startDeepScan={startDeepScan}/>
        </div>
        <div className="right-col">
          <AIAnalyzerWidget aiInput={aiInput} setAiInput={setAiInput} handleAiAnalysis={handleAiAnalysis} isAnalyzing={isAnalyzing} aiResult={aiResult}/>
          <AlertsWidget alerts={alerts} onBanIp={banIp}/>
        </div>
      </div>
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────
function App() {
  const route = useRoute();
  const [packets, setPackets] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [systemStatus, setSystemStatus] = useState('Initializing...');
  const [isAdminAuthed, setAdminAuthed] = useState(localStorage.getItem('admin_auth')==='true');
  const [systemStats, setSystemStats] = useState(null);
  const [isScanning, setIsScanning] = useState(false);
  const [scanProgress, setScanProgress] = useState(0);
  const [scanStatus, setScanStatus] = useState('');
  const [scanThreats, setScanThreats] = useState([]);
  const [aiInput, setAiInput] = useState('');
  const [aiResult, setAiResult] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [trafficData, setTrafficData] = useState(Array(30).fill({volume:5}));
  const [clock, setClock] = useState('');
  const [config, setConfig] = useState({sniffing_paused:false,ai_enabled:true,emergency_lockdown:false,honeypot_active:true,reverse_tracing_active:false,db_encryption_active:false});
  const [blocklist, setBlocklist] = useState([]);

  useEffect(()=>{const t=()=>setClock(new Date().toLocaleTimeString('en-GB'));t();const id=setInterval(t,1000);return()=>clearInterval(id);},[]);

  const fetchStats = useCallback(async()=>{try{const r=await fetch(`${API_BASE}/api/system_stats`);const d=await r.json();setSystemStats(d);}catch{}},[]);
  const fetchConfig = useCallback(async()=>{try{const r=await fetch(`${API_BASE}/api/admin/config`);const d=await r.json();if(d.active_config)setConfig(d.active_config);if(d.blocked_ips)setBlocklist(d.blocked_ips);}catch{}},[]);

  useEffect(()=>{
    fetchStats(); fetchConfig();
    const s=setInterval(fetchStats,5000); const c=setInterval(fetchConfig,4000);
    return()=>{clearInterval(s);clearInterval(c);};
  },[fetchStats,fetchConfig]);

  useEffect(()=>{
    const sock=io(API_BASE);
    sock.on('connect',()=>setSystemStatus('DEFENSE GRID ONLINE'));
    sock.on('disconnect',()=>setSystemStatus('CONNECTION LOST'));
    sock.on('new_packet',p=>{setPackets(prev=>[p,...prev].slice(0,50));setTrafficData(prev=>{const v=p.suspicious?Math.floor(Math.random()*40)+60:Math.floor(Math.random()*35)+10;return[...prev.slice(1),{volume:v,suspicious:p.suspicious}];});});
    sock.on('new_alert',a=>setAlerts(prev=>[a,...prev].slice(0,15)));
    sock.on('scan_progress',d=>{setScanProgress(d.percent);setScanStatus(d.status);if(d.percent>=100)setIsScanning(false);});
    sock.on('scan_threat',d=>setScanThreats(prev=>{const ex=new Set(prev.map(t=>t.name));return[...prev,...d.threats.filter(t=>!ex.has(t.name))];}));
    sock.on('scan_complete',d=>{setScanStatus(`Scan Complete - Security Score: ${d.score}/100`);setIsScanning(false);});
    return()=>sock.close();
  },[]);

  const startDeepScan=async()=>{if(isScanning)return;setIsScanning(true);setScanProgress(0);setScanThreats([]);setScanStatus('');try{await fetch(`${API_BASE}/api/scan`,{method:'POST'});}catch{setIsScanning(false);}};
  const handleAiAnalysis=async()=>{if(!aiInput.trim()||isAnalyzing)return;setIsAnalyzing(true);setAiResult(null);try{const r=await fetch(`${API_BASE}/api/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:aiInput})});setAiResult(await r.json());}finally{setIsAnalyzing(false);}};
  const handleLoginSuccess=()=>{localStorage.setItem('admin_auth','true');setAdminAuthed(true);fetchConfig();};
  const handleLogout=()=>{localStorage.removeItem('admin_auth');setAdminAuthed(false);};

  if (route==='/admin/login') return <AdminLogin onLoginSuccess={handleLoginSuccess} isAuthenticated={isAdminAuthed}/>;
  if (route==='/admin/panel') {
    if (!isAdminAuthed) { go('/admin/login'); return null; }
    return <AdminPanel systemStats={systemStats} onLogout={handleLogout} config={config} blocklist={blocklist} fetchConfig={fetchConfig}/>;
  }
  return <DashboardView packets={packets} alerts={alerts} systemStatus={systemStatus} systemStats={systemStats} isScanning={isScanning} scanProgress={scanProgress} scanStatus={scanStatus} scanThreats={scanThreats} aiInput={aiInput} setAiInput={setAiInput} handleAiAnalysis={handleAiAnalysis} isAnalyzing={isAnalyzing} aiResult={aiResult} trafficData={trafficData} clock={clock} startDeepScan={startDeepScan} config={config} blocklist={blocklist} fetchConfig={fetchConfig}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
