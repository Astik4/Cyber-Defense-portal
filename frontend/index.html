<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CyberShield SOC — Enterprise Security Operations Dashboard">
  <meta name="theme-color" content="#04070f">
  <title>CYBERSHIELD | Enterprise SOC Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-router@6.22.3/dist/umd/react-router.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-router-dom@6.22.3/dist/umd/react-router-dom.production.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

:root {
  --bg-void: #090c15; 
  --bg-deep: #0e1220; 
  --bg-surface: #141a2e;
  --bg-raised: #1c243f; 
  --bg-glass: rgba(20, 26, 46, 0.85);
  
  --cyan: #38bdf8; 
  --cyan-dim: rgba(56, 189, 248, 0.08); 
  --cyan-glow: rgba(56, 189, 248, 0.12);
  
  --blue-electric: #3b82f6; 
  --purple: #818cf8; 
  --purple-dim: rgba(129, 140, 248, 0.08);
  
  --danger: #ef4444; 
  --danger-dim: rgba(239, 68, 68, 0.08); 
  --danger-glow: rgba(239, 68, 68, 0.15);
  
  --warning: #f59e0b; 
  --warning-dim: rgba(245, 158, 11, 0.08);
  
  --success: #10b981; 
  --success-dim: rgba(16, 185, 129, 0.08);
  
  --font-display: 'Plus Jakarta Sans', sans-serif; 
  --font-mono: 'JetBrains Mono', monospace; 
  --font-body: 'Inter', sans-serif;
  
  --border-subtle: rgba(255, 255, 255, 0.06); 
  --border-mid: rgba(255, 255, 255, 0.12); 
  --border-bright: rgba(56, 189, 248, 0.5);
  
  --gap: 16px; 
  --radius: 8px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
}

body {
  background-color: var(--bg-void);
  color: #f1f5f9;
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.5;
  height: 100%;
  overflow: hidden;
}

#root {
  position: relative;
  z-index: 1;
  height: 100%;
}

::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border-mid);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--cyan);
}

/* Layout */
.dashboard-layout {
  display: grid;
  grid-template-columns: 320px 1fr 380px;
  grid-template-rows: 64px 1fr;
  gap: var(--gap);
  padding: var(--gap);
  height: 100vh;
  max-height: 100vh;
}

/* Header */
.header {
  grid-column: 1/-1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--cyan);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  font-size: 16px;
}

.logo-text {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #ffffff;
}

.logo-version {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cyan);
  opacity: 0.6;
  letter-spacing: 1px;
  margin-left: 4px;
  align-self: flex-end;
  margin-bottom: 2px;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 24px;
}

.header-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.header-stat-value {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--cyan);
}

.header-stat-label {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #64748b;
}

.header-divider {
  width: 1px;
  height: 24px;
  background: var(--border-subtle);
}

.system-status {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border: 1px solid rgba(16, 185, 129, 0.2);
  border-radius: 20px;
  background: rgba(16, 185, 129, 0.05);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
}

.status-text {
  color: var(--success);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 3px;
}

.nav-tab {
  background: transparent;
  border: none;
  color: #94a3b8;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 5px 14px;
  border-radius: 4px;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  text-decoration: none;
}

.nav-tab:hover {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.05);
}

.nav-tab.active {
  color: #ffffff;
  background: var(--cyan-dim);
  border: 1px solid rgba(56, 189, 248, 0.3);
  font-weight: 600;
}

/* Columns */
.left-col, .center-col, .right-col {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  min-height: 0;
}

/* Glass Panel */
.glass-panel {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s ease;
}

.glass-panel:hover {
  border-color: var(--border-mid);
}

/* Panel Header */
.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-display);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 1px;
  color: #ffffff;
  text-transform: uppercase;
  flex-shrink: 0;
}

.panel-header i {
  font-size: 12px;
  color: var(--cyan);
}

.panel-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9.5px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid currentColor;
  letter-spacing: 0.5px;
}

/* Packet Stream */
.packet-stream {
  flex: 1;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  min-height: 0;
}

.stream-header {
  display: grid;
  grid-template-columns: 65px 1fr 1fr 44px;
  gap: 4px;
  padding: 4px 8px;
  font-size: 9px;
  letter-spacing: 1px;
  color: #64748b;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 4px;
  text-transform: uppercase;
}

.packet-item {
  display: grid;
  grid-template-columns: 65px 1fr 1fr 44px;
  gap: 4px;
  padding: 5px 8px;
  border-radius: 4px;
  transition: background 0.1s ease;
  border-bottom: 1px solid rgba(255, 255, 255, 0.01);
}

.packet-item:hover {
  background: rgba(255, 255, 255, 0.03);
}

.packet-item span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.packet-item.suspicious {
  color: var(--warning);
  background: var(--warning-dim);
  border-left: 2.5px solid var(--warning);
}

.packet-item.malicious {
  color: var(--danger);
  background: var(--danger-dim);
  border-left: 2.5px solid var(--danger);
}

.proto-badge {
  font-size: 8.5px;
  padding: 1px 4px;
  border-radius: 3px;
  text-align: center;
  font-weight: 600;
  display: inline-block;
}

.proto-TCP {
  background: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
}

.proto-UDP {
  background: rgba(129, 140, 248, 0.15);
  color: #a5b4fc;
}

.proto-OTHER {
  background: rgba(255, 255, 255, 0.08);
  color: #94a3b8;
}

.stream-controls {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-shrink: 0;
}

.stream-meta {
  display: flex;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: #64748b;
  margin-bottom: 8px;
  flex-shrink: 0;
}

/* Graph */
.graph-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  gap: 8px;
}

.graph-container {
  flex: 1;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding: 0 4px;
  position: relative;
  min-height: 100px;
}

.graph-axis-y {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border-subtle);
}

.graph-axis-x {
  position: absolute;
  left: 0;
  right: 4px;
  bottom: 0;
  height: 1px;
  background: var(--border-subtle);
}

.graph-gridline {
  position: absolute;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--border-subtle);
}

.graph-bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  transition: height 0.3s ease;
  min-height: 2px;
  position: relative;
}

.graph-bar.normal {
  background: linear-gradient(180deg, var(--cyan) 0%, rgba(56, 189, 248, 0.2) 100%);
}

.graph-bar.suspicious {
  background: linear-gradient(180deg, var(--warning) 0%, rgba(245, 158, 11, 0.2) 100%);
}

.graph-bar.threat {
  background: linear-gradient(180deg, var(--danger) 0%, rgba(239, 68, 68, 0.2) 100%);
}

.graph-legend {
  display: flex;
  gap: 16px;
  font-size: 9px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  color: #64748b;
  flex-shrink: 0;
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}

/* Scan */
.action-center {
  flex: 1;
  min-height: 0;
}

.scan-btn-wrap {
  flex-shrink: 0;
}

.scan-progress-container {
  flex-shrink: 0;
  margin-top: 4px;
}

.scan-status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cyan);
  margin-bottom: 6px;
}

.scan-pct {
  font-weight: 600;
  font-size: 12px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  border-radius: 3px;
  transition: width 0.3s ease;
}

.threat-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
  min-height: 0;
}

.threat-list-header {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--danger);
  text-transform: uppercase;
  margin-bottom: 4px;
  flex-shrink: 0;
}

/* AI Analyzer */
.ai-analyzer-input {
  width: 100%;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--border-subtle);
  color: #f1f5f9;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  border-radius: var(--radius);
  resize: none;
  transition: border-color 0.15s ease;
  flex-shrink: 0;
}

.ai-analyzer-input:focus {
  outline: none;
  border-color: var(--cyan);
}

.ai-result {
  margin-top: 12px;
  padding: 14px;
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--purple);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  flex-shrink: 0;
  overflow-y: auto;
}

.ai-result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}

.ai-category {
  font-size: 11px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.5px;
}

.severity-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.severity-badge.Critical, .severity-badge.High {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.3);
}

.severity-badge.Medium {
  background: var(--warning-dim);
  color: var(--warning);
  border: 1px solid rgba(245, 158, 11, 0.3);
}

.severity-badge.Low {
  background: var(--success-dim);
  color: var(--success);
  border: 1px solid rgba(16, 185, 129, 0.3);
}

.ai-mitre {
  font-size: 10px;
  color: var(--purple);
  margin-bottom: 8px;
}

.ai-explanation {
  font-size: 10px;
  color: #94a3b8;
  line-height: 1.5;
  margin-bottom: 10px;
}

.ai-action {
  padding: 8px 10px;
  background: rgba(129, 140, 248, 0.08);
  border: 1px solid rgba(129, 140, 248, 0.15);
  border-radius: 4px;
  font-size: 10px;
  color: #c7d2fe;
}

.ai-action-label {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--purple);
  margin-bottom: 4px;
  text-transform: uppercase;
  font-weight: 600;
}

.confidence-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.confidence-label {
  font-size: 9px;
  letter-spacing: 0.5px;
  color: #64748b;
}

.confidence-val {
  font-size: 11px;
  color: var(--cyan);
  font-weight: 600;
}

/* Alerts */
.alerts-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}

.alert-item {
  padding: 10px 12px;
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  background: rgba(0, 0, 0, 0.1);
  transition: background 0.15s ease;
}

.alert-item:hover {
  background: rgba(0, 0, 0, 0.2);
}

.alert-item.severity-Critical, .alert-item.severity-High {
  border-left: 3px solid var(--danger);
  background: var(--danger-dim);
}

.alert-item.severity-Medium {
  border-left: 3px solid var(--warning);
  background: var(--warning-dim);
}

.alert-item.severity-Low {
  border-left: 3px solid var(--success);
  background: var(--success-dim);
}

.alert-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 9px;
  color: #64748b;
  margin-bottom: 4px;
}

.alert-threat {
  font-size: 11.5px;
  font-weight: 600;
  color: #ffffff;
}

/* Buttons */
.cyber-btn {
  background: var(--blue-electric);
  color: #ffffff;
  border: none;
  padding: 10px 20px;
  font-size: 11px;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.15s ease;
  border-radius: var(--radius);
  font-weight: 600;
  width: 100%;
}

.cyber-btn:hover:not(:disabled) {
  background: #2563eb;
}

.cyber-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.cyber-btn.danger {
  background: var(--danger);
}

.cyber-btn.danger:hover:not(:disabled) {
  background: #dc2626;
}

.cyber-btn.scanning {
  background: var(--warning);
}

.cyber-btn-sm {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: #94a3b8;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.cyber-btn-sm:hover, .cyber-btn-sm.active {
  border-color: var(--cyan);
  color: #ffffff;
  background: var(--cyan-dim);
}

.cyber-btn-sm.danger {
  color: var(--danger);
  border-color: rgba(239, 68, 68, 0.2);
}

.cyber-btn-sm.danger:hover, .cyber-btn-sm.danger.active {
  background: var(--danger-dim);
  border-color: var(--danger);
  color: #ffffff;
}

/* Threat items */
.threat-item {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: rgba(0, 0, 0, 0.1);
}

.threat-item.High, .threat-item.Critical {
  border-left: 3px solid var(--danger);
  background: var(--danger-dim);
}

.threat-item.Medium {
  border-left: 3px solid var(--warning);
  background: var(--warning-dim);
}

.threat-name {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 3px;
}

.threat-action {
  font-size: 10px;
  opacity: 0.7;
  font-family: var(--font-mono);
}

.execute-btn {
  flex-shrink: 0;
  background: var(--danger-dim);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: var(--danger);
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.15s ease;
  min-width: 80px;
}

.execute-btn:hover:not(:disabled) {
  background: var(--danger);
  color: white;
}

.execute-btn:disabled {
  opacity: 0.6;
  cursor: default;
}

.execute-btn.done {
  background: var(--success-dim);
  border-color: var(--success);
  color: var(--success);
  cursor: default;
}

/* Admin */
.admin-layout {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  height: 100%;
  overflow-y: auto;
  padding-bottom: 16px;
}

.admin-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--gap);
}

.stat-box {
  background: rgba(0, 0, 0, 0.15);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 14px 16px;
  flex: 1;
}

.stat-label {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #64748b;
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 6px;
}

.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
}

.toggle-row:last-child {
  border-bottom: none;
}

.audit-log-window {
  font-family: var(--font-mono);
  font-size: 11px;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  padding: 10px;
  height: 180px;
  overflow-y: auto;
  display: flex;

<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { BrowserRouter, Routes, Route, Navigate, Link, useNavigate } = window.ReactRouterDOM;
const API_BASE = '';

// ═══════════════════════════════════════════════
// LIVE STREAM WIDGET
// ═══════════════════════════════════════════════
// Helper function to export packet logs to CSV
const exportPacketsToCSV = (packets) => {
  if (packets.length === 0) return;
  const headers = ["Time", "Source", "Destination", "Protocol", "Status", "Severity", "Threat Type"];
  const rows = packets.map(p => [
    p.timestamp,
    p.source,
    p.destination,
    p.protocol,
    p.suspicious ? "SUSPICIOUS" : "OK",
    p.severity,
    p.threat_type || "None"
  ]);
  const csvContent = "data:text/csv;charset=utf-8," 
    + [headers.join(","), ...rows.map(e => e.map(val => `"${val}"`).join(","))].join("\n");
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", `cybershield_packets_${new Date().toISOString().split('T')[0]}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// Helper function to export alerts to CSV
const exportAlertsToCSV = (alerts) => {
  if (alerts.length === 0) return;
  const headers = ["Time", "Source IP", "Threat Name", "Severity"];
  const rows = alerts.map(a => [
    a.timestamp,
    a.source,
    a.threat,
    a.severity
  ]);
  const csvContent = "data:text/csv;charset=utf-8," 
    + [headers.join(","), ...rows.map(e => e.map(val => `"${val}"`).join(","))].join("\n");
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", `cybershield_alerts_${new Date().toISOString().split('T')[0]}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// ═══════════════════════════════════════════════
// LIVE STREAM WIDGET
// ═══════════════════════════════════════════════
const LiveStreamWidget = ({ packets }) => {
  const [isPaused, setIsPaused] = useState(false);
  const [showOnlyThreats, setShowOnly] = useState(false);
  const [displayed, setDisplayed] = useState(packets);
  useEffect(() => { if (!isPaused) setDisplayed(packets); }, [packets, isPaused]);
  const filtered = displayed.filter(p => showOnlyThreats ? p.suspicious : true);
  const threatCnt = displayed.filter(p => p.suspicious).length;
  return (
    <div className="glass-panel" style={{flex:1,minHeight:0}}>
      <div className="panel-header flex-between" style={{marginBottom:'10px'}}>
        <span><i className="fa-solid fa-satellite-dish"></i>&nbsp; Live Packet Stream</span>
        <span className="panel-badge" style={{color:threatCnt>0?'var(--danger)':'var(--success)',borderColor:'currentColor'}}>
          {threatCnt>0?`${threatCnt} THREATS`:'CLEAR'}
        </span>
      </div>
      <div className="stream-controls">
        <button className={`cyber-btn-sm ${isPaused?'danger active':''}`} onClick={()=>setIsPaused(p=>!p)}>
          <i className={`fa-solid fa-${isPaused?'play':'pause'}`}></i>&nbsp;{isPaused?'RESUME':'PAUSE'}
        </button>
        <button className={`cyber-btn-sm ${showOnlyThreats?'active':''}`} onClick={()=>setShowOnly(s=>!s)}>
          <i className="fa-solid fa-filter"></i>&nbsp;{showOnlyThreats?'THREATS ONLY':'ALL TRAFFIC'}
        </button>
        <button className="cyber-btn-sm" onClick={() => exportPacketsToCSV(filtered)} title="Export Packets to CSV">
          <i className="fa-solid fa-file-csv"></i>&nbsp;CSV
        </button>
        {isPaused&&<span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--warning)',letterSpacing:'2px'}}>⏸ PAUSED</span>}
      </div>
      <div className="stream-meta">
        <span>Visible: <span style={{color:'var(--cyan)'}}>{filtered.length}</span></span>
        <span>Threats: <span style={{color:threatCnt>0?'var(--danger)':'var(--success)'}}>{threatCnt}</span></span>
      </div>
      <div className="stream-header"><span>TIME</span><span>SOURCE</span><span>DESTINATION</span><span>PROTO</span></div>
      <div className="packet-stream">
        {filtered.length===0
          ? <div className="empty-state"><i className="fa-solid fa-satellite-dish"></i><span>{showOnlyThreats?'No threats detected':'Awaiting packet stream...'}</span></div>
          : filtered.map((pkt,i)=>(
            <div key={i} className={`packet-item ${pkt.suspicious?(pkt.severity==='High'?'malicious':'suspicious'):''}`}>
              <span>{pkt.timestamp}</span>
              <span title={pkt.source}>{pkt.source}</span>
              <span title={pkt.destination}>{pkt.destination}</span>
              <span><span className={`proto-badge proto-${pkt.protocol}`}>{pkt.protocol}</span></span>
            </div>
          ))
        }
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// NETWORK GRAPH WIDGET
// ═══════════════════════════════════════════════
const NetworkGraphWidget = ({ trafficData }) => {
  const maxVol = Math.max(...trafficData.map(d=>d.volume),1);
  const getBarClass = d => d.volume>80?'threat':d.volume>50?'suspicious':'normal';
  return (
    <div className="glass-panel" style={{flex:1,minHeight:0}}>
      <div className="panel-header">
        <i className="fa-solid fa-chart-line"></i>&nbsp; Network Traffic Load
        <span className="panel-badge text-dim" style={{color:'rgba(200,230,245,0.4)',borderColor:'rgba(200,230,245,0.15)',fontSize:'9px'}}>LIVE · {trafficData.length} SAMPLES</span>
      </div>
      <div className="graph-wrapper">
        <div className="graph-container">
          {[25,50,75].map(pct=><div key={pct} className="graph-gridline" style={{bottom:`${pct}%`}}/>)}
          <div className="graph-axis-y"/><div className="graph-axis-x"/>
          {trafficData.map((d,i)=><div key={i} className={`graph-bar ${getBarClass(d)}`} style={{height:`${(d.volume/maxVol)*95}%`}} title={`Volume: ${d.volume}`}/>)}
        </div>
        <div className="graph-legend">
          <span><span className="legend-dot" style={{background:'var(--cyan)'}}></span>Normal</span>
          <span><span className="legend-dot" style={{background:'var(--warning)'}}></span>Suspicious</span>
          <span><span className="legend-dot" style={{background:'var(--danger)'}}></span>Threat</span>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// DEEP SCAN WIDGET
// ═══════════════════════════════════════════════
const DeepScanWidget = ({ isScanning, scanProgress, scanStatus, scanThreats, startDeepScan }) => {
  const [executed, setExecuted] = useState({});
  const handleExecute = threat => {
    if (executed[threat.name]) return;
    setExecuted(prev=>({...prev,[threat.name]:'running'}));
    setTimeout(()=>setExecuted(prev=>({...prev,[threat.name]:'done'})),1500);
  };
  return (
    <div className="glass-panel action-center">
      <div className="panel-header"><i className="fa-solid fa-bolt"></i>&nbsp; Active Defense Grid</div>
      <div className="scan-btn-wrap">
        <button className={`cyber-btn ${isScanning?'scanning':''}`} onClick={startDeepScan} disabled={isScanning}>
          {isScanning?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp; SCAN IN PROGRESS</>:<><i className="fa-solid fa-shield-virus"></i>&nbsp; Initiate Deep Threat Scan</>}
        </button>
      </div>
      {isScanning&&(
        <div className="scan-progress-container fade-in">
          <div className="scan-status-row">
            <span style={{maxWidth:'75%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scanStatus||'Initializing...'}</span>
            <span className="scan-pct">{scanProgress}%</span>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${scanProgress}%`}}/></div>
        </div>
      )}
      {!isScanning&&scanStatus&&(
        <div className="fade-in" style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--cyan)',padding:'8px 0'}}>
          <i className="fa-solid fa-check-circle" style={{marginRight:'6px',color:'var(--success)'}}></i>{scanStatus}
        </div>
      )}
      {scanThreats.length>0&&(
        <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',marginTop:'10px'}}>
          <div className="threat-list-header"><i className="fa-solid fa-radiation" style={{marginRight:'6px'}}></i>{scanThreats.length} Anomal{scanThreats.length===1?'y':'ies'} Detected</div>
          <div className="threat-list">
            {scanThreats.map((threat,idx)=>(
              <div key={idx} className={`threat-item fade-in ${threat.severity}`}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="threat-name">{threat.name}</div>
                  <div className="threat-action"><i className="fa-solid fa-arrow-right" style={{marginRight:'4px',fontSize:'9px'}}></i>{threat.action}</div>
                </div>
                <button className={"execute-btn"+(executed[threat.name]==='done'?' done':'')} onClick={()=>handleExecute(threat)} disabled={!!executed[threat.name]}>
                  {executed[threat.name]==='running'?<><i className="fa-solid fa-spinner fa-spin" style={{marginRight:'4px'}}></i>RUNNING</>:executed[threat.name]==='done'?<><i className="fa-solid fa-check" style={{marginRight:'4px'}}></i>DONE</>:'EXECUTE'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
      {!isScanning&&scanThreats.length===0&&!scanStatus&&(
        <div className="empty-state" style={{flex:1}}><i className="fa-solid fa-shield-halved"></i><span>System secure — no threats detected</span></div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════
// AI ANALYZER WIDGET  (enhanced with IOC lookup + IP geo)
// ═══════════════════════════════════════════════
const AIAnalyzerWidget = ({ aiInput, setAiInput, handleAiAnalysis, isAnalyzing, aiResult }) => {
  const [tab, setTab] = useState('analyze');
  const [iocInput, setIocInput] = useState('');
  const [iocResult, setIocResult] = useState(null);
  const [iocLoading, setIocLoading] = useState(false);

  // Real IP geolocation via ip-api.com (free, no key)
  const lookupIOC = async () => {
    if (!iocInput.trim()) return;
    setIocLoading(true); setIocResult(null);
    const val = iocInput.trim();
    const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
    if (ipRegex.test(val)) {
      try {
        const r = await fetch(`http://ip-api.com/json/${val}?fields=status,message,country,regionName,city,isp,org,as,lat,lon,proxy,hosting,query`);
        const d = await r.json();
        if (d.status === 'success') {
          setIocResult({
            type: 'IP Address', indicator: val,
            country: d.country, region: d.regionName, city: d.city,
            isp: d.isp, org: d.org, asn: d.as,
            lat: d.lat, lon: d.lon,
            proxy: d.proxy ? '⚠ YES — Possible VPN/Proxy' : 'No',
            hosting: d.hosting ? '⚠ YES — Datacenter/Hosting IP' : 'No',
            risk: (d.proxy || d.hosting) ? 'Medium' : 'Low',
            note: (d.proxy||d.hosting)?'This IP is associated with a proxy/VPN or hosting provider — common in attacks.':'No immediate indicators of compromise from geo data.'
          });
        } else {
          setIocResult({ type:'IP Address', indicator: val, error: d.message||'Lookup failed (private/reserved IP?)' });
        }
      } catch(e) { setIocResult({error:'Network error — check connection'}); }
    } else {
      // Hash / domain — do heuristic analysis
      const isDomain = /^[a-zA-Z0-9][a-zA-Z0-9-]{1,61}[a-zA-Z0-9]\.[a-zA-Z]{2,}$/.test(val);
      const isHash = /^[a-fA-F0-9]{32,64}$/.test(val);
      const suspiciousTLDs = ['.xyz','.top','.club','.online','.site','.tk','.ml','.ga'];
      const hasSuspTLD = suspiciousTLDs.some(t => val.endsWith(t));
      const hasHyphen = (val.match(/-/g)||[]).length > 2;
      const isLong = val.length > 30;
      let risk = 'Low'; let notes = [];
      if (hasSuspTLD) { risk='High'; notes.push('Suspicious TLD commonly abused in phishing campaigns'); }
      if (hasHyphen)  { risk='Medium'; notes.push('Multiple hyphens — possible DGA or typosquat domain'); }
      if (isLong)     { notes.push('Unusually long domain — may be generated (DGA)'); }
      if (isHash)     { notes.push('File hash — cross-reference with VirusTotal for definitive verdict'); }
      setIocResult({
        type: isHash?'File Hash':isDomain?'Domain':'Unknown Indicator', indicator: val,
        risk, note: notes.length ? notes.join(' | ') : 'No automated red flags. Manual investigation recommended.',
        action: isHash ? 'Submit to VirusTotal/MalwareBazaar' : isDomain ? 'Check WHOIS, run DNS lookup, verify SSL cert' : 'Manual analysis required'
      });
    }
    setIocLoading(false);
  };

  const getSeverityClass = sev => (!sev?'':sev==='Critical'||sev==='High'?'Critical':sev);

  return (
    <div className="glass-panel" style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div className="panel-header"><i className="fa-solid fa-microchip"></i>&nbsp; Nexus AI Analyzer</div>
      <div className="inner-tabs">
        {[['analyze','fa-magnifying-glass','AI Analyze'],['ioc','fa-crosshairs','IOC Lookup']].map(([t,ic,label])=>(
          <button key={t} className={`inner-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            <i className={`fa-solid ${ic}`} style={{marginRight:'5px'}}></i>{label}
          </button>
        ))}
      </div>

      {tab==='analyze'&&(
        <>
          <textarea className="ai-analyzer-input" rows={3}
            placeholder="Enter suspicious IP, domain, hash, or log snippet... (Ctrl+Enter to analyze)"
            value={aiInput} onChange={e=>setAiInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))handleAiAnalysis();}}
            style={{marginBottom:'10px',flexShrink:0}}/>
          <button className="cyber-btn" onClick={handleAiAnalysis} disabled={isAnalyzing} style={{flexShrink:0}}>
            {isAnalyzing?<><i className="fa-solid fa-circle-nodes fa-spin"></i>&nbsp; Analyzing...</>:<><i className="fa-solid fa-magnifying-glass"></i>&nbsp; Analyze Threat</>}
          </button>
          {aiResult&&(
            <div className="ai-result fade-in" style={{flex:1,overflowY:'auto',marginTop:'12px'}}>
              <div className="ai-result-header">
                <span className="ai-category">{aiResult.category}</span>
                <span className={`severity-badge ${getSeverityClass(aiResult.severity)}`}>{aiResult.severity}</span>
              </div>
              <div className="confidence-row"><span className="confidence-label">CONFIDENCE</span><span className="confidence-val">{aiResult.confidence}</span></div>
              <div className="ai-mitre"><i className="fa-solid fa-diagram-project" style={{marginRight:'6px'}}></i>{aiResult.mitre_mapping}</div>
              {aiResult.attack_type&&<div style={{marginBottom:'8px',fontSize:'10px',color:'rgba(200,230,245,0.5)'}}><i className="fa-solid fa-skull-crossbones" style={{marginRight:'6px',color:'var(--warning)'}}></i>{aiResult.attack_type}</div>}
              <p className="ai-explanation">{aiResult.explanation}</p>
              <div className="ai-action"><div className="ai-action-label">Recommended Action</div>{aiResult.recommended_action}</div>
              {aiResult.mitigation&&aiResult.mitigation.length>0&&(
                <div style={{marginTop:'10px'}}>
                  <div style={{fontSize:'9px',letterSpacing:'2px',color:'rgba(200,230,245,0.4)',marginBottom:'6px',textTransform:'uppercase'}}>Mitigation Steps</div>
                  {aiResult.mitigation.map((step,i)=>(
                    <div key={i} style={{fontSize:'10px',color:'rgba(200,230,245,0.6)',padding:'3px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',display:'flex',gap:'8px'}}>
                      <span style={{color:'var(--cyan)',flexShrink:0}}>{String(i+1).padStart(2,'0')}</span>{step}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          {!aiResult&&!isAnalyzing&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-microchip"></i><span>Enter an indicator above to begin analysis</span></div>}
        </>
      )}

      {tab==='ioc'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'8px',fontFamily:'var(--font-mono)'}}>
            Lookup IP geo/reputation, domain flags, or file hash indicators.
          </div>
          <div style={{display:'flex',gap:'8px',marginBottom:'8px',flexShrink:0}}>
            <input className="ai-analyzer-input" style={{flex:1,padding:'8px 12px'}}
              placeholder="IP, domain, or MD5/SHA256 hash"
              value={iocInput} onChange={e=>setIocInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')lookupIOC();}}/>
            <button className="cyber-btn-sm active" onClick={lookupIOC} style={{padding:'0 16px',flexShrink:0}}>
              {iocLoading?<i className="fa-solid fa-spinner fa-spin"></i>:<><i className="fa-solid fa-crosshairs"></i>&nbsp;LOOKUP</>}
            </button>
          </div>
          {iocResult&&(
            <div className="ioc-result fade-in" style={{flex:1,overflowY:'auto'}}>
              {iocResult.error
                ? <div style={{color:'var(--danger)',fontSize:'11px'}}><i className="fa-solid fa-triangle-exclamation" style={{marginRight:'6px'}}></i>{iocResult.error}</div>
                : <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid var(--border-subtle)'}}>
                    <span style={{color:'var(--cyan)',fontWeight:600,fontSize:'11px'}}>{iocResult.type}</span>
                    {iocResult.risk&&<span className={`severity-badge ${iocResult.risk==='High'?'High':iocResult.risk==='Medium'?'Medium':'Low'}`}>RISK: {iocResult.risk}</span>}
                  </div>
                  {Object.entries(iocResult).filter(([k])=>!['type','error','risk','note','action','indicator'].includes(k)).map(([k,v])=>(
                    <div key={k} className="ioc-row">
                      <span className="ioc-key">{k.toUpperCase()}</span>
                      <span className="ioc-val">{String(v)}</span>
                    </div>
                  ))}
                  {iocResult.note&&<div style={{marginTop:'10px',padding:'8px',background:'rgba(0,0,0,0.3)',borderRadius:'4px',fontSize:'10px',color:'rgba(200,230,245,0.6)',borderLeft:'3px solid var(--purple)'}}>{iocResult.note}</div>}
                  {iocResult.action&&<div style={{marginTop:'8px',fontSize:'10px',color:'var(--cyan)',fontFamily:'var(--font-mono)'}}><i className="fa-solid fa-arrow-right" style={{marginRight:'6px'}}></i>{iocResult.action}</div>}
                </>
              }
            </div>
          )}
          {!iocResult&&!iocLoading&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-crosshairs"></i><span>Enter an indicator to look up</span></div>}
        </div>
      )}
    </div>
  );
};

// ALERTS WIDGET  (supports direct IP blocking & CSV export)
// ═══════════════════════════════════════════════
const AlertsWidget = ({ alerts, blocklist, onBlockSuccess }) => {
  const handleBlock = async (ip) => {
    if (blocklist && blocklist.includes(ip)) return;
    try {
      await fetch('/api/admin/blocklist', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ip})
      });
      if (onBlockSuccess) onBlockSuccess();
    } catch (e) {}
  };

  const isLocalIP = (ip) => {
    return !ip || ip.startsWith("127.") || ip.startsWith("192.168.") || ip.startsWith("10.") || ip.startsWith("172.16.") || ip === "::1" || ip === "system" || ip.toLowerCase().includes("simulated") || ip.toLowerCase().includes("x");
  };

  return (
    <div className="glass-panel" style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div className="panel-header flex-between">
        <span><i className="fa-solid fa-triangle-exclamation"></i>&nbsp; Live Alerts</span>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          {alerts.length>0&&<button className="cyber-btn-sm" style={{padding:'2px 8px'}} onClick={() => exportAlertsToCSV(alerts)} title="Export Alerts to CSV"><i className="fa-solid fa-file-csv"></i>&nbsp;CSV</button>}
          {alerts.length>0&&<span className="panel-badge" style={{color:'var(--danger)',borderColor:'var(--danger)'}}>{alerts.length}</span>}
        </div>
      </div>
      <div className="alerts-list">
        {alerts.length===0
          ? <div className="empty-state" style={{flex:1}}><i className="fa-solid fa-shield-check"></i><span>No active alerts</span></div>
          : alerts.map((alert,i)=>(
            <div key={i} className={`alert-item severity-${alert.severity} fade-in`}>
              <div className="alert-meta">
                <span><i className="fa-regular fa-clock" style={{marginRight:'4px'}}></i>{alert.timestamp}</span>
                <span style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  SRC: {alert.source}
                  {!isLocalIP(alert.source) && (
                    blocklist && blocklist.includes(alert.source)
                      ? <span style={{color:'var(--danger)',fontSize:'8px',fontWeight:700}}>[BANNED]</span>
                      : <button className="cyber-btn-sm danger" style={{padding:'0px 5px',fontSize:'8px',lineHeight:1.1}} onClick={()=>handleBlock(alert.source)}>BAN</button>
                  )}
                </span>
              </div>
              <div className="alert-threat">{alert.threat}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
};

const AdminLogin = ({ onLoginSuccess, isAuthenticated }) => {
  const navigate = useNavigate();
  useEffect(() => {
    if (isAuthenticated) {
      navigate('/admin/panel', { replace: true });
    }
  }, [isAuthenticated, navigate]);

  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const handleLogin = async e => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const res = await fetch(`${API_BASE}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const data = await res.json();
      if (res.ok&&data.success) {
        onLoginSuccess();
        navigate('/admin/panel');
      }
      else setError(data.error||'Authentication Failed.');
    } catch { setError('Cannot reach backend server.'); }
    finally { setLoading(false); }
  };
  return (
    <div className="login-wrap fade-in">
      <div className="glass-panel login-panel">
        <div className="login-icon"><i className="fa-solid fa-lock"></i></div>
        <div className="login-title">RESTRICTED ACCESS</div>
        <div className="login-sub">Administrative credentials required.</div>
        <form className="login-form" onSubmit={handleLogin}>
          <div className="input-group"><i className="fa-solid fa-user"></i><input type="text" className="login-input" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} required autoComplete="username"/></div>
          <div className="input-group"><i className="fa-solid fa-key"></i><input type="password" className="login-input" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required autoComplete="current-password"/></div>
          {error&&<div className="error-msg fade-in"><i className="fa-solid fa-triangle-exclamation"></i>{error}</div>}
          <button type="submit" className="cyber-btn" disabled={loading} style={{marginTop:'8px'}}>
            {loading?<><i className="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Authenticating...</>:<><i className="fa-solid fa-right-to-bracket"></i>&nbsp; Authorize</>}
          </button>
        </form>
      </div>
    </div>
  );
};

// TRACEROUTE COMPONENT
// ═══════════════════════════════════════════════
const TracerouteTool = ({ target, setTarget, addAudit }) => {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const handleTrace = async () => {
    if (!target.trim()) return;
    setLoading(true); setResult(null);
    try {
      const res = await fetch('/api/admin/trace', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ip: target.trim()})
      });
      const data = await res.json();
      setResult(data);
      addAudit('admin', `Reverse IP Trace completed for ${target.trim()}`);
    } catch(e) {}
    setLoading(false);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'12px',flex:1}}>
      <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',fontFamily:'var(--font-mono)'}}>
        Execute a traceroute simulation to discover geography and ISP path hops.
      </p>
      <div style={{display:'flex',gap:'8px',flexShrink:0}}>
        <input className="ai-analyzer-input" style={{flex:1,padding:'8px 12px'}} placeholder="Target IP to Trace (e.g. 8.8.8.8)" value={target} onChange={e=>setTarget(e.target.value)}/>
        <button className="cyber-btn-sm active" style={{padding:'0 20px'}} onClick={handleTrace} disabled={loading}>
          {loading ? <><i className="fa-solid fa-spinner fa-spin"></i>&nbsp;TRACING</> : <><i className="fa-solid fa-route"></i>&nbsp;TRACE</>}
        </button>
      </div>

      {result && (
        <div className="fade-in" style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:'16px',marginTop:'10px'}}>
          <div className="stat-box" style={{background:'rgba(0,0,0,0.15)',padding:'12px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',fontFamily:'var(--font-mono)',fontSize:'10px'}}>
              <div><strong>Target Host:</strong> {result.target}</div>
              <div><strong>Provider Network:</strong> {result.asn} ({result.org})</div>
              <div><strong>Geo Location:</strong> {result.city}, {result.country}</div>
              <div><strong>Path Length:</strong> {result.hops.length} Hops</div>
            </div>
          </div>
          
          <div className="trace-flow" style={{display:'flex',flexDirection:'column',position:'relative',paddingLeft:'20px'}}>
            <div className="trace-line" style={{position:'absolute',left:'6px',top:'10px',bottom:'10px',width:'2px',borderLeft:'2px dashed var(--cyan)',opacity:0.4}}></div>
            {result.hops.map((hop, i) => (
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:'12px',position:'relative',marginBottom:'14px'}}>
                <div style={{
                  position:'absolute',left:'-19px',top:'4px',width:'8px',height:'8px',
                  borderRadius:'50%',background:i===result.hops.length-1?'var(--danger)':'var(--cyan)',
                  border:'2px solid var(--bg-surface)'
                }}></div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--cyan)',width:'40px'}}>HOP {hop.hop}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:'11px',color:'#ffffff'}}>{hop.ip}</div>
                  <div style={{fontSize:'9px',color:'#64748b'}}>{hop.name} • <span style={{color:'var(--warning)'}}>{hop.geo}</span></div>
                </div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',fontWeight:600,color:'var(--success)'}}>{hop.rtt}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {!result && !loading && <div className="empty-state" style={{flex:1}}><i className="fa-solid fa-route"></i><span>Enter target IP and click TRACE</span></div>}
    </div>
  );
};

// ADMIN PANEL  (full real-world version)
// ═══════════════════════════════════════════════
const AdminPanel = ({ systemStats, onLogout, config, blocklist, fetchConfig }) => {
  const navigate = useNavigate();
  const [section, setSection] = useState('overview');
  const [toolTab, setToolTab] = useState('port');
  const [banIp, setBanIp] = useState('');
  const [history, setHistory] = useState([]);
  const [processes, setProcesses] = useState([]);
  const [connections, setConnections] = useState([]);
  const [portTarget, setPortTarget] = useState('127.0.0.1');
  const [portResults, setPortResults] = useState([]);
  const [portScanning, setPortScanning] = useState(false);
  const [rules, setRules] = useState([]);
  const [newRuleName, setNewRuleName] = useState('');
  const [newRuleMatch, setNewRuleMatch] = useState('');
  const [newRuleAction, setNewRuleAction] = useState('block');
  const [auditLog, setAuditLog] = useState([
    {time:'--:--:--',user:'system',act:'CyberShield Admin Control started'},
  ]);

  const addAudit = (user,act) => setAuditLog(prev=>[{time:new Date().toTimeString().split(' ')[0],user,act},...prev].slice(0,50));

  const fetchHistory = async()=>{
    try{const r=await fetch('/api/history');const d=await r.json();setHistory(d.alerts||[]);}catch(e){}
  };
  const fetchProcesses = async()=>{
    try{const r=await fetch(`${API_BASE}/api/processes`);const d=await r.json();setProcesses(d.processes||[]);}catch(e){}
  };
  const fetchConnections = async()=>{
    try{const r=await fetch(`${API_BASE}/api/connections`);const d=await r.json();setConnections(d.connections||[]);}catch(e){}
  };
  const fetchRules = async()=>{
    try{const r=await fetch('/api/admin/rules');const d=await r.json();setRules(d.rules||[]);}catch(e){}
  };

  useEffect(()=>{
    fetchHistory();
    fetchRules();
    const iv=setInterval(()=>{fetchHistory();},5000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(section==='processes')fetchProcesses();
    if(section==='connections')fetchConnections();
    if(section==='rules')fetchRules();
  },[section]);

  const toggle = async key=>{
    const nv=!config[key];
    await fetch('/api/admin/config',{
      method:'POST',
      headers:{'Content-Type': 'application/json'},
      body:JSON.stringify({[key]:nv})
    });
    fetchConfig();
    addAudit('admin',`${key.replace('_', ' ').toUpperCase()} toggled to ${nv ? 'ACTIVE' : 'OFFLINE'}`);
  };

  const handleBan = async()=>{
    if(!banIp.trim())return;
    const parts=banIp.trim().split('.');
    if(parts.length!==4||!parts.every(p=>!isNaN(p)&&+p>=0&&+p<=255)){alert('Invalid IP format');return;}
    await fetch('/api/admin/blocklist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:banIp.trim()})});
    addAudit('admin',`Banned IP: ${banIp.trim()}`);
    setBanIp('');
    fetchConfig();
  };

  const runPortScan = async()=>{
    setPortScanning(true);setPortResults([]);
    try{
      const r=await fetch(`${API_BASE}/api/portscan`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:portTarget})});
      const d=await r.json();
      setPortResults(d.results||[]);
      addAudit('admin',`Port scan on ${portTarget}: ${(d.results||[]).filter(p=>p.state==='open').length} open ports`);
    }catch(e){setPortResults([{port:'Error',state:'closed',service:'Backend unreachable'}]);}
    setPortScanning(false);
  };

  const handleToggleRule = async (id, currentActive) => {
    try {
      await fetch('/api/admin/rules/toggle', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id, active: !currentActive})
      });
      fetchRules();
      addAudit('admin', `IDS Rule ID ${id} toggled ${!currentActive ? 'ON' : 'OFF'}`);
    } catch {}
  };

  const handleDeleteRule = async (id) => {
    try {
      await fetch(`/api/admin/rules/${id}`, {method: 'DELETE'});
      fetchRules();
      addAudit('admin', `Deleted IDS Rule ID: ${id}`);
    } catch {}
  };

  const handleAddRule = async (e) => {
    e.preventDefault();
    if (!newRuleName.trim() || !newRuleMatch.trim()) return;
    try {
      await fetch('/api/admin/rules', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: newRuleName.trim(),
          match: newRuleMatch.trim(),
          action: newRuleAction,
          active: true
        })
      });
      setNewRuleName(''); setNewRuleMatch('');
      fetchRules();
      addAudit('admin', `Added new IDS Rule: ${newRuleName}`);
    } catch {}
  };

  const statColor=pct=>pct>80?'var(--danger)':pct>60?'var(--warning)':'var(--cyan)';

  const defconLevel=()=>{
    const threats=history.filter(h=>h.severity==='Critical'||h.severity==='High').length;
    if(threats>10)return{level:1,color:'var(--danger)',desc:'Maximum readiness — critical breach detected'};
    if(threats>5)return{level:2,color:'var(--danger)',desc:'Increased threat activity — active response'};
    if(threats>2)return{level:3,color:'var(--warning)',desc:'Elevated alert — monitoring intensified'};
    if(threats>0)return{level:4,color:'var(--warning)',desc:'Below normal tension — watch conditions'};
    return{level:5,color:'var(--success)',desc:'Normal readiness — no significant threats'};
  };
  const defcon=defconLevel();

  const SECTIONS=[
    ['overview','fa-gauge-high','Overview'],
    ['firewall','fa-shield-virus','Firewall'],
    ['processes','fa-microchip','Processes'],
    ['connections','fa-network-wired','Connections'],
    ['portscan','fa-screwdriver-wrench','Diagnostic Tools'],
    ['history','fa-clock-rotate-left','Alert History'],
    ['rules','fa-list-check','IDS Rules'],
    ['logs','fa-terminal','Audit Log'],
    ['simulator','fa-vial','Attack Simulator'],
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {config.emergency_lockdown && (
        <div className="lockdown-banner">
          <span><i className="fa-solid fa-triangle-exclamation"></i>&nbsp; <strong>CRITICAL ALERT:</strong> SECURE ADMIN CONTROL UNIT IN LOCKDOWN STATE — OUTSIDE TRAFFIC SEVERED</span>
          <span style={{fontSize:'9px',opacity:0.8}}>SECURE ACCESS PANEL</span>
        </div>
      )}
      <div className="dashboard-layout fade-in" style={{height: config.emergency_lockdown ? 'calc(100vh - 36px)' : '100vh'}}>
        <header className="header">
          <div className="logo-container">
            <div className="logo-icon" style={{color:'var(--danger)',borderColor:'var(--danger)'}}><i className="fa-solid fa-user-shield"></i></div>
            <div><div style={{display:'flex',alignItems:'baseline',gap:'8px'}}><span className="logo-text">SECURE ADMIN PORTAL</span></div></div>
          </div>
          <div className="header-center">
            <nav className="nav-tabs">
              <Link to="/dashboard" className="nav-tab">
                <i className="fa-solid fa-gauge-high"></i>&nbsp;Public Dashboard
              </Link>
              <button className="nav-tab active" onClick={onLogout} style={{background:'rgba(239, 68, 68, 0.1)',border:'1px solid rgba(239, 68, 68, 0.3)',color:'#ef4444',cursor:'pointer'}}>
                <i className="fa-solid fa-right-from-bracket"></i>&nbsp;Logout
              </button>
            </nav>
          </div>
        </header>

        <div style={{gridColumn:'1/-1',minHeight:0,overflow:'auto',display:'flex',flexDirection:'column',gap:'16px'}} className="admin-layout admin-theme">
          {/* Sub-nav */}
          <div style={{display:'flex',gap:'4px',flexWrap:'wrap',flexShrink:0}}>
            {SECTIONS.map(([id,ic,label])=>(
              <button key={id} className={`nav-tab ${section===id?'active':''}`} style={{fontSize:'10px',padding:'5px 12px'}} onClick={()=>setSection(id)}>
                <i className={`fa-solid ${ic}`} style={{marginRight:'5px'}}></i>{label}
              </button>
            ))}
          </div>

          {/* ── OVERVIEW ── */}
          {section==='overview'&&(
            <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
              {/* DEFCON */}
              <div className="defcon-strip" style={{borderColor:defcon.color,background:`rgba(0,0,0,0.4)`}}>
                <div className="defcon-level-box" style={{color:defcon.color,textShadow:`0 0 20px ${defcon.color}`}}>D{defcon.level}</div>
                <div className="defcon-info">
                  <div className="defcon-title" style={{color:defcon.color}}>DEFCON {defcon.level} — {['','COCKED PISTOL','FAST PACE','ROUND HOUSE','DOUBLE TAKE','FADE OUT'][defcon.level]}</div>
                  <div className="defcon-desc">{defcon.desc}</div>
                </div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'rgba(200,230,245,0.4)',textAlign:'right'}}>
                  <div>{history.filter(h=>h.severity==='Critical').length} CRITICAL</div>
                  <div>{history.filter(h=>h.severity==='High').length} HIGH</div>
                  <div>{history.length} TOTAL ALERTS</div>
                </div>
              </div>
              {/* Stats */}
              <div style={{display:'flex',gap:'12px'}}>
                {[['CPU Usage',systemStats?.cpu_percent,'%'],['Memory',systemStats?.memory_percent,'%'],['Disk',systemStats?.disk_percent,'%'],['TCP Conns',systemStats?.net_connections,'']].map(([label,val,unit])=>(
                  <div key={label} className="stat-box" style={{flex:1}}>
                    <div className="stat-label">{label}</div>
                    <div className="stat-value" style={{color:val!=null&&unit==='%'?statColor(val):'var(--cyan)'}}>{val!=null?`${val}${unit}`:'---'}</div>
                    {val!=null&&unit==='%'&&<div className="progress-bar" style={{height:'3px',marginTop:'4px'}}><div className="progress-fill" style={{width:`${val}%`,background:statColor(val)}}/></div>}
                  </div>
                ))}
              </div>
              {/* Engine Config */}
              <div className="glass-panel">
                <div className="panel-header"><i className="fa-solid fa-gears"></i>&nbsp; Engine Configuration</div>
                <div style={{display:'flex',flexDirection:'column'}}>
                  {[
                    {label:'Live Packet Capture',key:'sniffing_paused',invert:true,on:'ACTIVE',off:'PAUSED'},
                    {label:'AI Threat Analysis Engine',key:'ai_enabled',invert:false,on:'ONLINE',off:'OFFLINE'},
                  ].map(({label,key,invert,on,off})=>{
                    const isOn=invert?!config[key]:config[key];
                    return(
                      <div key={key} className="toggle-row">
                        <span style={{fontSize:'12px'}}>{label}</span>
                        <button className={`cyber-btn-sm ${isOn?'active':'danger active'}`} onClick={()=>toggle(key)}>{isOn?on:off}</button>
                      </div>
                    );
                  })}
                  {[
                    {label:'Honeypot Protocols',key:'honeypot_active',on:'DEPLOYED',off:'OFFLINE'},
                    {label:'Reverse IP Tracing',key:'reverse_tracing_active',on:'ONLINE',off:'OFFLINE'},
                    {label:'DB Auto-Encryption',key:'db_encryption_active',on:'ACTIVE',off:'OFFLINE'},
                  ].map(({label,key,on,off})=>{
                    const isOn = config[key];
                    return (
                      <div key={key} className="toggle-row">
                        <span style={{fontSize:'12px'}}>{label}</span>
                        <button className={`cyber-btn-sm ${isOn?'active':'danger active'}`} onClick={()=>toggle(key)}>{isOn?on:off}</button>
                      </div>
                    );
                  })}
                  <div className="toggle-row" style={{borderTop:'1px solid rgba(239, 68, 68, 0.15)',paddingTop:'12px',marginTop:'8px'}}>
                    <span style={{fontSize:'12px',color:'var(--danger)',fontWeight:'bold'}}>
                      <i className="fa-solid fa-radiation"></i>&nbsp; EMERGENCY SYSTEM LOCKDOWN (FIREWALL ENGAGED)
                    </span>
                    <button className={`cyber-btn-sm ${config.emergency_lockdown?'danger active':'active'}`} onClick={()=>toggle('emergency_lockdown')}>
                      {config.emergency_lockdown?'ACTIVE (LOCKDOWN)':'STANDBY'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── FIREWALL ── */}
          {section==='firewall'&&(
            <div className="glass-panel">
              <div className="panel-header"><i className="fa-solid fa-shield-virus"></i>&nbsp; IP Firewall Blocklist</div>
              <p style={{fontSize:'11px',color:'rgba(200,230,245,0.4)',marginBottom:'12px',fontFamily:'var(--font-mono)'}}>
                Manually ban IPs. Blocked IPs are rejected at the application layer and logged.
              </p>
              <div className="blocklist-input-row">
                <input className="ai-analyzer-input" placeholder="e.g. 203.0.113.42" value={banIp} onChange={e=>setBanIp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleBan()}/>
                <button className="ban-btn" onClick={handleBan}>BAN</button>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'6px',maxHeight:'300px',overflowY:'auto'}}>
                {blocklist.length===0
                  ? <div style={{fontSize:'11px',color:'rgba(200,230,245,0.3)',fontFamily:'var(--font-mono)',padding:'6px 0'}}>No IPs currently blocked.</div>
                  : blocklist.map((ip,i)=>(
                    <div key={i} className="blocked-ip">
                      <span><i className="fa-solid fa-ban" style={{marginRight:'6px'}}></i>{ip}</span>
                      <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                        <span style={{fontSize:'9px',letterSpacing:'1px'}}>BLOCKED</span>
                        <button className="cyber-btn-sm danger" style={{padding:'2px 8px',fontSize:'9px'}} onClick={async()=>{
                          await fetch('/api/admin/blocklist',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});
                          addAudit('admin',`Unbanned IP: ${ip}`);fetchConfig();
                        }}>UNBAN</button>
                      </div>
                    </div>
                  ))
                }
              </div>
            </div>
          )}

          {/* ── PROCESSES ── */}
          {section==='processes'&&(
            <div className="glass-panel">
              <div className="panel-header">
                <i className="fa-solid fa-microchip"></i>&nbsp; Running Processes
                <button className="cyber-btn-sm active" style={{marginLeft:'auto'}} onClick={fetchProcesses}><i className="fa-solid fa-rotate"></i>&nbsp;REFRESH</button>
              </div>
              <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'10px',fontFamily:'var(--font-mono)'}}>
                Live process list. Highlighted rows indicate suspicious execution paths or high CPU usage.
              </p>
              <div style={{overflowY:'auto',flex:1}}>
                {processes.length===0
                  ? <div className="empty-state"><i className="fa-solid fa-spinner fa-spin"></i><span>Loading process list...</span></div>
                  : <table className="proc-table">
                    <thead><tr><th>PID</th><th>Name</th><th>CPU %</th><th>RAM MB</th><th>Status</th></tr></thead>
                    <tbody>
                      {processes.map((p,i)=>(
                        <tr key={i} className={p.suspicious?'proc-row-suspicious':p.critical?'proc-row-critical':''}>
                          <td style={{color:'rgba(200,230,245,0.4)'}}>{p.pid}</td>
                          <td>{p.name}{p.suspicious&&<span style={{marginLeft:'6px',color:'var(--warning)',fontSize:'9px'}}>⚠</span>}</td>
                          <td>
                            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                              {p.cpu.toFixed(1)}%
                              <div className="cpu-bar-wrap"><div className="cpu-bar-fill" style={{width:`${Math.min(p.cpu,100)}%`,background:p.cpu>80?'var(--danger)':p.cpu>50?'var(--warning)':'var(--cyan)'}}></div></div>
                            </div>
                          </td>
                          <td>{(p.mem/1024/1024).toFixed(1)}</td>
                          <td><span className={`conn-status ${p.status==='running'?'ESTABLISHED':'other'}`}>{p.status}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                }
              </div>
            </div>
          )}

          {/* ── CONNECTIONS ── */}
          {section==='connections'&&(
            <div className="glass-panel">
              <div className="panel-header">
                <i className="fa-solid fa-network-wired"></i>&nbsp; Active Network Connections
                <button className="cyber-btn-sm active" style={{marginLeft:'auto'}} onClick={fetchConnections}><i className="fa-solid fa-rotate"></i>&nbsp;REFRESH</button>
              </div>
              <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'10px',fontFamily:'var(--font-mono)'}}>
                All active TCP/UDP connections. Flags established external connections for review.
              </p>
              <div style={{overflowY:'auto',flex:1}}>
                {connections.length===0
                  ? <div className="empty-state"><i className="fa-solid fa-spinner fa-spin"></i><span>Loading connections...</span></div>
                  : <table className="history-table">
                    <thead><tr><th>Proto</th><th>Local</th><th>Remote</th><th>Status</th><th>PID</th></tr></thead>
                    <tbody>
                      {connections.map((c,i)=>(
                        <tr key={i} style={c.external?{background:'rgba(255,171,0,0.05)'}:{}}>
                          <td><span className="proto-badge proto-TCP">TCP</span></td>
                          <td style={{fontFamily:'var(--font-mono)',fontSize:'10px'}}>{c.local}</td>
                          <td style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:c.external?'var(--warning)':'inherit'}}>{c.remote||'—'}{c.external&&<span style={{marginLeft:'4px',fontSize:'9px',color:'var(--warning)'}}>EXT</span>}</td>
                          <td><span className={`conn-status ${c.status}`}>{c.status}</span></td>
                          <td style={{color:'rgba(200,230,245,0.4)',fontSize:'10px'}}>{c.pid||'—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                }
              </div>
            </div>
          )}

          {/* ── DIAGNOSTIC TOOLS (PORT SCANNER & TRACEROUTE) ── */}
          {section==='portscan'&&(
            <div className="glass-panel" style={{flex:1}}>
              <div className="panel-header"><i className="fa-solid fa-screwdriver-wrench"></i>&nbsp; Diagnostics & Network Tools</div>
              <div className="inner-tabs" style={{marginBottom:'12px'}}>
                <button className={`inner-tab ${toolTab==='port'?'active':''}`} onClick={()=>setToolTab('port')}>
                  <i className="fa-solid fa-binoculars" style={{marginRight:'5px'}}></i>Port Scanner
                </button>
                <button className={`inner-tab ${toolTab==='trace'?'active':''}`} onClick={()=>setToolTab('trace')}>
                  <i className="fa-solid fa-route" style={{marginRight:'5px'}}></i>IP Traceroute
                </button>
              </div>

              {toolTab==='port' && (
                <div style={{display:'flex',flexDirection:'column',gap:'12px',flex:1}}>
                  <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',fontFamily:'var(--font-mono)'}}>
                    Scan common TCP ports on a target host to identify open services.
                  </p>
                  <div style={{display:'flex',gap:'8px',flexShrink:0}}>
                    <input className="ai-analyzer-input" style={{flex:1,padding:'8px 12px'}} placeholder="Target IP (e.g. 127.0.0.1)" value={portTarget} onChange={e=>setPortTarget(e.target.value)}/>
                    <button className="cyber-btn-sm active" style={{padding:'0 20px'}} onClick={runPortScan} disabled={portScanning}>
                      {portScanning?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp;SCANNING</>:<><i className="fa-solid fa-binoculars"></i>&nbsp;SCAN</>}
                    </button>
                  </div>
                  {portResults.length>0&&(
                    <div style={{flex:1,overflowY:'auto'}}>
                      <div style={{display:'flex',gap:'16px',marginBottom:'10px',fontFamily:'var(--font-mono)',fontSize:'10px'}}>
                        <span style={{color:'var(--danger)'}}>{portResults.filter(p=>p.state==='open').length} OPEN</span>
                        <span style={{color:'var(--warning)'}}>{portResults.filter(p=>p.state==='filtered').length} FILTERED</span>
                        <span style={{color:'rgba(200,230,245,0.4)'}}>{portResults.filter(p=>p.state==='closed').length} CLOSED</span>
                      </div>
                      <div className="port-result-grid">
                        {portResults.map((p,i)=>(
                          <div key={i} className={`port-chip ${p.state}`}>
                            <span className="port-chip-num">{p.port}</span>
                            <span className="port-chip-svc">{p.service}</span>
                            <span style={{fontSize:'8px',textTransform:'uppercase',letterSpacing:'1px'}}>{p.state}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {portResults.length===0&&!portScanning&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-binoculars"></i><span>Enter a target and click SCAN</span></div>}
                </div>
              )}

              {toolTab==='trace' && (
                <TracerouteTool target={portTarget} setTarget={setPortTarget} addAudit={addAudit} />
              )}
            </div>
          )}

          {/* ── ALERT HISTORY ── */}
          {section==='history'&&(
            <div className="glass-panel">
              <div className="panel-header flex-between">
                <span><i className="fa-solid fa-clock-rotate-left"></i>&nbsp; Alert History</span>
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  {history.length>0&&<button className="cyber-btn-sm" style={{padding:'2px 8px'}} onClick={() => exportAlertsToCSV(history)} title="Export History to CSV"><i className="fa-solid fa-file-csv"></i>&nbsp;CSV</button>}
                  <span className="panel-badge" style={{color:'var(--cyan)',borderColor:'var(--border-mid)'}}>{history.length} RECORDS</span>
                </div>
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                {history.length===0
                  ? <div className="empty-state"><i className="fa-solid fa-clock-rotate-left"></i><span>No alert history yet</span></div>
                  : <table className="history-table">
                    <thead><tr><th>Time</th><th>Source</th><th>Threat</th><th>Severity</th><th>Action</th></tr></thead>
                    <tbody>
                      {history.map((a,i)=>(
                        <tr key={i}>
                          <td style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'rgba(200,230,245,0.4)',whiteSpace:'nowrap'}}>{a.timestamp}</td>
                          <td style={{fontFamily:'var(--font-mono)',fontSize:'10px'}}>{a.source_module}</td>
                          <td style={{maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'11px'}}>{a.threat_name}</td>
                          <td><span className={`severity-badge ${a.severity==='Critical'||a.severity==='High'?'High':a.severity}`}>{a.severity}</span></td>
                          <td>
                            {!a.source_module.startsWith("127.") && !a.source_module.startsWith("192.168.") && !a.source_module.includes("X") && (
                              blocklist.includes(a.source_module)
                                ? <span style={{color:'var(--danger)',fontSize:'9px',fontWeight:700}}>[BANNED]</span>
                                : <button className="cyber-btn-sm danger" style={{padding:'2px 6px',fontSize:'9px'}} onClick={async()=>{
                                    await fetch('/api/admin/blocklist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:a.source_module})});
                                    addAudit('admin',`Banned IP: ${a.source_module}`);fetchConfig();
                                  }}>BAN IP</button>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                }
              </div>
            </div>
          )}

          {/* ── IDS RULES ── */}
          {section==='rules'&&(
            <div className="glass-panel">
              <div className="panel-header"><i className="fa-solid fa-list-check"></i>&nbsp; IDS / Firewall Rules</div>
              
              <form onSubmit={handleAddRule} style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'16px',paddingBottom:'16px',borderBottom:'1px solid var(--border-subtle)',flexShrink:0}}>
                <div style={{fontWeight:600,fontSize:'10px',color:'#ffffff',letterSpacing:'1px'}}>CREATE NEW DETECTOR RULE</div>
                <div style={{display:'flex',gap:'8px'}}>
                  <input className="ai-analyzer-input" style={{flex:1,padding:'6px 10px'}} placeholder="Rule Name (e.g. Block Port 8080)" value={newRuleName} onChange={e=>setNewRuleName(e.target.value)} required/>
                  <input className="ai-analyzer-input" style={{flex:1,padding:'6px 10px'}} placeholder="Match (e.g. dst_port == 8080)" value={newRuleMatch} onChange={e=>setNewRuleMatch(e.target.value)} required/>
                  <select className="ai-analyzer-input" style={{width:'110px',padding:'6px 10px',background:'var(--bg-surface)'}} value={newRuleAction} onChange={e=>setNewRuleAction(e.target.value)}>
                    <option value="block">BLOCK</option>
                    <option value="alert-only">ALERT</option>
                    <option value="allow">ALLOW</option>
                  </select>
                  <button className="cyber-btn-sm active" type="submit" style={{padding:'0 16px'}}><i className="fa-solid fa-plus"></i>&nbsp;ADD</button>
                </div>
              </form>

              <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'12px',fontFamily:'var(--font-mono)'}}>
                Intrusion detection rule table. Toggle to activate. Evaluated in order of precedence.
              </p>
              <div style={{display:'flex',flexDirection:'column',gap:'6px',flex:1,overflowY:'auto'}}>
                {rules.map(rule=>(
                  <div key={rule.id} className={`rule-item ${rule.active?'active':'disabled'}`}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:'11px',marginBottom:'3px'}}>{rule.name}</div>
                      <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'rgba(200,230,245,0.4)'}}>{rule.match}</div>
                    </div>
                    <span className={`rule-badge ${rule.action}`}>{rule.action.toUpperCase()}</span>
                    <button className={`cyber-btn-sm ${rule.active?'active':'danger'}`} style={{marginLeft:'8px',minWidth:'60px'}} onClick={()=>handleToggleRule(rule.id, rule.active)}>
                      {rule.active?'ON':'OFF'}
                    </button>
                    <button className="cyber-btn-sm danger" style={{marginLeft:'8px',padding:'4px 8px'}} onClick={()=>handleDeleteRule(rule.id)}>
                      <i className="fa-solid fa-trash"></i>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── AUDIT LOG ── */}
          {section==='logs'&&(
            <div className="glass-panel" style={{flex:1}}>
              <div className="panel-header"><i className="fa-solid fa-terminal"></i>&nbsp; System Audit Log</div>
              <div className="audit-log-window" style={{height:'auto',flex:1,maxHeight:'none'}}>
                {auditLog.map((log,i)=>(
                  <div key={i} className="audit-entry">
                    <span className="audit-time">[{log.time}]</span>
                    <span className="audit-user">{log.user}@cybershield:~$</span>
                    <span>{log.act}</span>
                  </div>
                ))}
                <div className="audit-entry">
                  <span className="audit-time">[{new Date().toTimeString().split(' ')[0]}]</span>
                  <span className="audit-user">admin@cybershield:~$</span>
                  <span className="blink">_</span>
                </div>
              </div>
            </div>
          )}

          {/* ── ATTACK SIMULATOR ── */}
          {section==='simulator'&&(
            <div className="glass-panel" style={{flex:1}}>
              <div className="panel-header"><i className="fa-solid fa-vial"></i>&nbsp; Attack Simulation Console</div>
              <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'14px',fontFamily:'var(--font-mono)'}}>
                Generate synthetic security events to test the SOC dashboard, AI threat analyzer mitigation recommendations, and firewalls.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
                {[
                  {type:'ddos',title:'Simulate DDoS SYN Flood',desc:'Injects 15 rapid TCP requests from diverse external IPs, triggering rapid DoS warnings.',icon:'fa-wind',btn:'Flood Network'},
                  {type:'bruteforce',title:'Simulate SSH Brute Force',desc:'Simulates repeated failed root logins from a single external IP, triggering brute force alerts.',icon:'fa-key',btn:'Trigger Auth Alert'},
                  {type:'sqli',title:'Simulate SQL Injection',desc:'Injects HTTP request with query parameter payloads (OR 1=1), triggering web app firewall warnings.',icon:'fa-database',btn:'Inject SQL Payload'},
                  {type:'malware',title:'Simulate Malware C2 beacon',desc:'Triggers callback request from a local system to a known external command & control server.',icon:'fa-skull',btn:'Beacon C2 Server'}
                ].map(sim => (
                  <div key={sim.type} className="stat-box" style={{display:'flex',flexDirection:'column',gap:'6px',justifyContent:'space-between'}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:'11.5px',color:'#ffffff',display:'flex',alignItems:'center',gap:'8px'}}>
                        <i className={`fa-solid ${sim.icon}`} style={{color:'var(--warning)'}}></i>{sim.title}
                      </div>
                      <div style={{fontSize:'10px',color:'#64748b',marginTop:'4px',fontFamily:'var(--font-mono)'}}>{sim.desc}</div>
                    </div>
                    <button className="cyber-btn-sm active" style={{marginTop:'8px',width:'100%',textAlign:'center'}} onClick={async()=>{
                      try {
                        await fetch(`${API_BASE}/api/admin/simulate_attack`, {
                          method: 'POST',
                          headers: {'Content-Type': 'application/json'},
                          body: JSON.stringify({type: sim.type})
                        });
                        addAudit('simulator', `Triggered simulated attack: ${sim.type}`);
                      } catch(e) {}
                    }}>
                      {sim.btn}
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};
