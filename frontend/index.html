<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CyberShield SOC — Enterprise Security Operations Dashboard">
  <meta name="theme-color" content="#04070f">
  <title>CYBERSHIELD | Enterprise SOC Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&family=Exo+2:wght@300;400;500;600&display=swap');

:root {
  --bg-void: #04070f; --bg-deep: #070d1a; --bg-surface: #0b1425;
  --bg-raised: #0f1e35; --bg-glass: rgba(11,20,37,0.75);
  --cyan: #00e5ff; --cyan-dim: rgba(0,229,255,0.15); --cyan-glow: rgba(0,229,255,0.4);
  --blue-electric: #1565ff; --purple: #7c3aed; --purple-dim: rgba(124,58,237,0.2);
  --danger: #ff1744; --danger-dim: rgba(255,23,68,0.15); --danger-glow: rgba(255,23,68,0.5);
  --warning: #ffab00; --warning-dim: rgba(255,171,0,0.15);
  --success: #00e676; --success-dim: rgba(0,230,118,0.15);
  --font-display: 'Orbitron', monospace; --font-mono: 'JetBrains Mono', monospace; --font-body: 'Exo 2', sans-serif;
  --border-subtle: rgba(0,229,255,0.12); --border-mid: rgba(0,229,255,0.25); --border-bright: rgba(0,229,255,0.6);
  --gap: 16px; --radius: 6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  background-color:var(--bg-void);color:#c8e6f5;font-family:var(--font-body);font-size:14px;line-height:1.5;height:100%;overflow:hidden;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px),
    radial-gradient(ellipse 80% 60% at 15% 50%,rgba(0,229,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 20%,rgba(124,58,237,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 100%,rgba(21,101,255,0.05) 0%,transparent 60%);
}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#root{position:relative;z-index:1;height:100%;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--cyan);}

/* Layout */
.dashboard-layout{display:grid;grid-template-columns:320px 1fr 380px;grid-template-rows:64px 1fr;gap:var(--gap);padding:var(--gap);height:100vh;max-height:100vh;}

/* Header */
.header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:0 24px;background:linear-gradient(90deg,rgba(0,229,255,0.05),transparent 40%,rgba(124,58,237,0.04));border:1px solid var(--border-subtle);border-radius:var(--radius);position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--cyan) 30%,var(--purple) 70%,transparent 100%);animation:headerLine 4s ease-in-out infinite;}
@keyframes headerLine{0%,100%{opacity:0.4;transform:scaleX(0.8);}50%{opacity:1;transform:scaleX(1);}}
.logo-container{display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;border:1.5px solid var(--cyan);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:16px;box-shadow:0 0 12px var(--cyan-glow),inset 0 0 8px var(--cyan-dim);animation:iconPulse 3s ease-in-out infinite;}
@keyframes iconPulse{0%,100%{box-shadow:0 0 12px var(--cyan-glow),inset 0 0 8px var(--cyan-dim);}50%{box-shadow:0 0 20px var(--cyan-glow),inset 0 0 12px var(--cyan-dim);}}
.logo-text{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px var(--cyan-glow);}
.logo-version{font-family:var(--font-mono);font-size:10px;color:rgba(0,229,255,0.4);letter-spacing:2px;margin-left:4px;align-self:flex-end;margin-bottom:2px;}
.header-center{display:flex;align-items:center;gap:24px;}
.header-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.header-stat-value{font-family:var(--font-mono);font-size:16px;font-weight:600;color:var(--cyan);}
.header-stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,230,245,0.4);}
.header-divider{width:1px;height:30px;background:var(--border-subtle);}
.system-status{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;}
.status-indicator{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid rgba(0,230,118,0.3);border-radius:20px;background:rgba(0,230,118,0.06);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.status-text{color:var(--success);font-size:10px;letter-spacing:2px;}
.nav-tabs{display:flex;gap:4px;background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:4px;padding:3px;}
.nav-tab{background:transparent;border:none;color:rgba(200,230,245,0.5);font-family:var(--font-body);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;padding:5px 12px;border-radius:3px;transition:all 0.2s;}
.nav-tab:hover{color:var(--cyan);background:var(--cyan-dim);}
.nav-tab.active{color:var(--bg-void);background:var(--cyan);font-weight:600;box-shadow:0 0 10px var(--cyan-glow);}

/* Columns */
.left-col,.center-col,.right-col{display:flex;flex-direction:column;gap:var(--gap);min-height:0;}

/* Glass Panel */
.glass-panel{background:var(--bg-glass);backdrop-filter:blur(16px);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
.glass-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border-mid),transparent);opacity:0.6;}
.glass-panel:hover{border-color:var(--border-mid);box-shadow:0 0 20px rgba(0,229,255,0.06);}
.glass-panel::after{content:'';position:absolute;top:0;left:0;width:20px;height:20px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);border-radius:6px 0 0 0;opacity:0.4;}

/* Panel Header */
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle);font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;flex-shrink:0;}
.panel-header i{font-size:12px;opacity:0.8;}
.panel-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid currentColor;letter-spacing:1px;}

/* Packet Stream */
.packet-stream{flex:1;overflow-y:auto;font-family:var(--font-mono);font-size:11px;min-height:0;}
.stream-header{display:grid;grid-template-columns:65px 1fr 1fr 44px;gap:4px;padding:4px 8px;font-size:9px;letter-spacing:2px;color:rgba(200,230,245,0.3);border-bottom:1px solid var(--border-subtle);margin-bottom:4px;text-transform:uppercase;}
.packet-item{display:grid;grid-template-columns:65px 1fr 1fr 44px;gap:4px;padding:5px 8px;border-radius:3px;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.03);}
.packet-item:hover{background:rgba(0,229,255,0.05);}
.packet-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.packet-item.suspicious{color:var(--warning);background:var(--warning-dim);border-left:2px solid var(--warning);}
.packet-item.malicious{color:var(--danger);background:var(--danger-dim);border-left:2px solid var(--danger);animation:maliciousFlash 1.5s ease-in-out infinite alternate;}
@keyframes maliciousFlash{from{background:var(--danger-dim);}to{background:rgba(255,23,68,0.25);}}
.proto-badge{font-size:9px;padding:1px 4px;border-radius:2px;text-align:center;font-weight:600;}
.proto-TCP{background:rgba(0,229,255,0.15);color:var(--cyan);}
.proto-UDP{background:rgba(124,58,237,0.2);color:#a78bfa;}
.proto-OTHER{background:rgba(255,255,255,0.08);color:rgba(200,230,245,0.5);}
.stream-controls{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0;}
.stream-meta{display:flex;gap:16px;font-family:var(--font-mono);font-size:10px;color:rgba(200,230,245,0.4);margin-bottom:8px;flex-shrink:0;}

/* Graph */
.graph-wrapper{flex:1;display:flex;flex-direction:column;min-height:0;gap:8px;}
.graph-container{flex:1;display:flex;align-items:flex-end;gap:3px;padding:0 4px;position:relative;min-height:100px;}
.graph-axis-y{position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--border-subtle);}
.graph-axis-x{position:absolute;left:0;right:4px;bottom:0;height:1px;background:var(--border-subtle);}
.graph-gridline{position:absolute;left:0;right:0;height:1px;background:var(--border-subtle);opacity:0.4;}
.graph-bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.4s cubic-bezier(0.4,0,0.2,1),background 0.3s;min-height:2px;position:relative;}
.graph-bar.normal{background:linear-gradient(180deg,var(--cyan) 0%,rgba(0,229,255,0.3) 100%);box-shadow:0 0 6px rgba(0,229,255,0.3);}
.graph-bar.suspicious{background:linear-gradient(180deg,var(--warning) 0%,rgba(255,171,0,0.3) 100%);box-shadow:0 0 6px rgba(255,171,0,0.4);}
.graph-bar.threat{background:linear-gradient(180deg,var(--danger) 0%,rgba(255,23,68,0.3) 100%);box-shadow:0 0 6px var(--danger-glow);}
.graph-legend{display:flex;gap:16px;font-size:9px;font-family:var(--font-mono);letter-spacing:1px;color:rgba(200,230,245,0.4);flex-shrink:0;}
.legend-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}

/* Scan */
.action-center{flex:1;min-height:0;}
.scan-btn-wrap{flex-shrink:0;}
.scan-progress-container{flex-shrink:0;margin-top:4px;}
.scan-status-row{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;color:var(--cyan);margin-bottom:6px;letter-spacing:0.5px;}
.scan-pct{font-weight:600;font-size:12px;}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px;transition:width 0.4s ease;position:relative;}
.progress-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:rgba(255,255,255,0.4);filter:blur(4px);animation:progressGlow 1s ease-in-out infinite alternate;}
@keyframes progressGlow{from{opacity:0.4;}to{opacity:1;}}
.threat-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-top:12px;min-height:0;}
.threat-list-header{font-family:var(--font-display);font-size:9px;letter-spacing:3px;color:var(--danger);text-transform:uppercase;margin-bottom:4px;flex-shrink:0;}

/* AI Analyzer */
.ai-analyzer-input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border-subtle);color:#c8e6f5;padding:10px 12px;font-family:var(--font-mono);font-size:12px;border-radius:var(--radius);resize:none;transition:border-color 0.2s,box-shadow 0.2s;flex-shrink:0;}
.ai-analyzer-input:focus{outline:none;border-color:rgba(124,58,237,0.5);box-shadow:0 0 12px rgba(124,58,237,0.2);}
.ai-result{margin-top:12px;padding:14px;background:rgba(0,0,0,0.4);border:1px solid var(--border-subtle);border-left:3px solid var(--purple);border-radius:var(--radius);font-family:var(--font-mono);font-size:11px;flex-shrink:0;overflow-y:auto;}
.ai-result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle);}
.ai-category{font-size:11px;font-weight:600;color:var(--cyan);letter-spacing:1px;}
.severity-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:2px;text-transform:uppercase;}
.severity-badge.Critical,.severity-badge.High{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger);box-shadow:0 0 8px var(--danger-dim);}
.severity-badge.Medium{background:var(--warning-dim);color:var(--warning);border:1px solid var(--warning);}
.severity-badge.Low{background:var(--success-dim);color:var(--success);border:1px solid var(--success);}
.ai-mitre{font-size:10px;color:var(--purple);margin-bottom:8px;letter-spacing:0.5px;}
.ai-explanation{font-size:10px;color:rgba(200,230,245,0.65);line-height:1.6;margin-bottom:10px;}
.ai-action{padding:8px 10px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);border-radius:4px;font-size:10px;color:#a78bfa;}
.ai-action-label{font-size:9px;letter-spacing:2px;color:var(--purple);margin-bottom:4px;text-transform:uppercase;}
.confidence-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.confidence-label{font-size:9px;letter-spacing:1px;color:rgba(200,230,245,0.4);}
.confidence-val{font-size:11px;color:var(--cyan);font-weight:600;}

/* Alerts */
.alerts-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0;}
.alert-item{padding:10px 12px;border:1px solid var(--border-subtle);border-radius:4px;background:rgba(0,0,0,0.2);transition:background 0.2s;}
.alert-item:hover{background:rgba(0,0,0,0.35);}
.alert-item.severity-Critical,.alert-item.severity-High{border-left:3px solid var(--danger);background:var(--danger-dim);}
.alert-item.severity-Medium{border-left:3px solid var(--warning);background:var(--warning-dim);}
.alert-item.severity-Low{border-left:3px solid var(--success);background:var(--success-dim);}
.alert-meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:rgba(200,230,245,0.4);margin-bottom:4px;letter-spacing:0.5px;}
.alert-threat{font-size:12px;font-weight:600;color:#e8f4fd;letter-spacing:0.5px;}

/* Buttons */
.cyber-btn{background:transparent;color:var(--cyan);border:1px solid var(--border-mid);padding:10px 20px;font-size:11px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:2px;cursor:pointer;position:relative;overflow:hidden;transition:all 0.25s;border-radius:var(--radius);font-weight:600;width:100%;}
.cyber-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.08),transparent);transition:left 0.4s;}
.cyber-btn:hover:not(:disabled){border-color:var(--cyan);color:var(--bg-void);background:var(--cyan);box-shadow:0 0 20px var(--cyan-glow);}
.cyber-btn:hover:not(:disabled)::before{left:100%;}
.cyber-btn:disabled{opacity:0.5;cursor:not-allowed;}
.cyber-btn.danger{color:var(--danger);border-color:rgba(255,23,68,0.4);}
.cyber-btn.danger:hover:not(:disabled){background:var(--danger);border-color:var(--danger);color:white;box-shadow:0 0 20px var(--danger-glow);}
.cyber-btn.scanning{color:var(--warning);border-color:var(--warning);animation:scanningPulse 2s ease-in-out infinite;}
@keyframes scanningPulse{0%,100%{box-shadow:0 0 0 rgba(255,171,0,0);}50%{box-shadow:0 0 16px rgba(255,171,0,0.3);}}
.cyber-btn-sm{background:transparent;border:1px solid var(--border-subtle);color:rgba(200,230,245,0.6);font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:3px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;white-space:nowrap;}
.cyber-btn-sm:hover,.cyber-btn-sm.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim);}
.cyber-btn-sm.danger{color:var(--danger);border-color:rgba(255,23,68,0.3);}
.cyber-btn-sm.danger:hover,.cyber-btn-sm.danger.active{background:var(--danger-dim);border-color:var(--danger);}

/* Threat items */
.threat-item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.2);}
.threat-item.High,.threat-item.Critical{border-left:3px solid var(--danger);background:var(--danger-dim);}
.threat-item.Medium{border-left:3px solid var(--warning);background:var(--warning-dim);}
.threat-name{font-size:11px;font-weight:600;margin-bottom:3px;}
.threat-action{font-size:10px;opacity:0.6;font-family:var(--font-mono);}
.execute-btn{flex-shrink:0;background:var(--danger-dim);border:1px solid rgba(255,23,68,0.4);color:var(--danger);font-family:var(--font-mono);font-size:9px;padding:4px 10px;border-radius:3px;cursor:pointer;letter-spacing:1px;font-weight:600;transition:all 0.2s;min-width:80px;}
.execute-btn:hover:not(:disabled){background:var(--danger);color:white;box-shadow:0 0 8px var(--danger-glow);}
.execute-btn:disabled{opacity:0.7;cursor:default;}
.execute-btn.done{background:var(--success-dim);border-color:var(--success);color:var(--success);cursor:default;}

/* Admin */
.admin-layout{display:flex;flex-direction:column;gap:var(--gap);height:100%;overflow-y:auto;padding-bottom:16px;}
.admin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--gap);}
.admin-theme{--cyan:#ff4444;--cyan-glow:rgba(255,68,68,0.4);--cyan-dim:rgba(255,68,68,0.1);--border-subtle:rgba(255,68,68,0.12);--border-mid:rgba(255,68,68,0.25);}
.stat-box{background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:4px;padding:14px 16px;flex:1;}
.stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,230,245,0.4);margin-bottom:6px;}
.stat-value{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--cyan);margin-bottom:6px;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-subtle);font-size:12px;}
.toggle-row:last-child{border-bottom:none;}
.audit-log-window{font-family:var(--font-mono);font-size:11px;background:rgba(0,0,0,0.5);border:1px solid var(--border-subtle);border-radius:4px;padding:10px;height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.audit-entry{display:flex;gap:10px;font-size:10px;}
.audit-time{color:rgba(200,230,245,0.3);flex-shrink:0;}
.audit-user{color:var(--warning);flex-shrink:0;}

/* Login */
.login-wrap{display:flex;justify-content:center;align-items:center;height:100%;}
.login-panel{width:380px;padding:36px;}
.login-icon{width:64px;height:64px;border-radius:50%;border:1.5px solid var(--danger);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:var(--danger);box-shadow:0 0 20px rgba(255,23,68,0.2);}
.login-title{font-family:var(--font-display);font-size:16px;letter-spacing:4px;text-align:center;color:#e8f4fd;margin-bottom:6px;}
.login-sub{font-size:11px;color:rgba(200,230,245,0.4);text-align:center;margin-bottom:28px;letter-spacing:0.5px;}
.login-form{display:flex;flex-direction:column;gap:12px;}
.input-group{position:relative;}
.input-group i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(200,230,245,0.3);font-size:12px;}
.login-input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border-subtle);color:#c8e6f5;padding:10px 12px 10px 36px;font-family:var(--font-mono);font-size:12px;border-radius:var(--radius);transition:border-color 0.2s,box-shadow 0.2s;}
.login-input:focus{outline:none;border-color:var(--border-mid);box-shadow:0 0 10px var(--cyan-dim);}
.error-msg{display:flex;align-items:center;gap:8px;background:var(--danger-dim);border:1px solid rgba(255,23,68,0.3);color:var(--danger);font-family:var(--font-mono);font-size:11px;padding:8px 12px;border-radius:var(--radius);}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;color:rgba(200,230,245,0.25);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-align:center;flex:1;}
.empty-state i{font-size:24px;opacity:0.3;}

/* Utilities */
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.flex-row{display:flex;align-items:center;gap:8px;}
.flex-col{display:flex;flex-direction:column;gap:8px;}
.fade-in{animation:fadeIn 0.35s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.text-cyan{color:var(--cyan);}.text-danger{color:var(--danger);}.text-warning{color:var(--warning);}.text-success{color:var(--success);}.text-dim{color:rgba(200,230,245,0.4);}.text-mono{font-family:var(--font-mono);}
.blink{animation:blinkAnim 1s step-end infinite;}
@keyframes blinkAnim{0%,100%{opacity:1;}50%{opacity:0;}}

/* Blocklist */
.blocklist-input-row{display:flex;gap:8px;margin-bottom:14px;flex-shrink:0;}
.blocklist-input-row .ai-analyzer-input{flex:1;margin:0;padding:8px 12px;font-size:11px;}
.ban-btn{flex-shrink:0;background:var(--danger-dim);border:1px solid rgba(255,23,68,0.4);color:var(--danger);font-family:var(--font-display);font-size:9px;padding:0 14px;border-radius:var(--radius);cursor:pointer;letter-spacing:2px;font-weight:700;transition:all 0.2s;}
.ban-btn:hover{background:var(--danger);color:white;}
.blocked-ip{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--danger-dim);border:1px solid rgba(255,23,68,0.2);border-radius:3px;font-family:var(--font-mono);font-size:10px;color:var(--danger);}

/* ── NEW: Process Table ── */
.proc-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:10px;}
.proc-table th{text-align:left;padding:4px 8px;font-size:9px;letter-spacing:2px;color:rgba(200,230,245,0.3);border-bottom:1px solid var(--border-subtle);text-transform:uppercase;}
.proc-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
.proc-table tr:hover td{background:rgba(0,229,255,0.04);}
.proc-row-suspicious td{color:var(--warning);}
.proc-row-critical td{color:var(--danger);}
.cpu-bar-wrap{width:60px;height:5px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;}
.cpu-bar-fill{height:100%;border-radius:2px;}

/* ── NEW: Port Scanner ── */
.port-result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin-top:10px;}
.port-chip{padding:5px 6px;border-radius:3px;font-family:var(--font-mono);font-size:9px;text-align:center;border:1px solid;}
.port-chip.open{background:var(--danger-dim);border-color:rgba(255,23,68,0.4);color:var(--danger);}
.port-chip.closed{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.08);color:rgba(200,230,245,0.25);}
.port-chip.filtered{background:var(--warning-dim);border-color:rgba(255,171,0,0.3);color:var(--warning);}
.port-chip-num{font-weight:700;display:block;}
.port-chip-svc{font-size:8px;opacity:0.7;}

/* ── NEW: IOC Lookup ── */
.ioc-result{padding:12px;background:rgba(0,0,0,0.4);border:1px solid var(--border-subtle);border-radius:var(--radius);font-family:var(--font-mono);font-size:11px;margin-top:10px;}
.ioc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:10px;}
.ioc-row:last-child{border-bottom:none;}
.ioc-key{color:rgba(200,230,245,0.4);flex-shrink:0;margin-right:12px;}
.ioc-val{color:#c8e6f5;text-align:right;word-break:break-all;}

/* ── NEW: WHOIS / Geo ── */
.geo-card{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.geo-field{background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:4px;padding:8px 10px;}
.geo-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,230,245,0.3);margin-bottom:4px;}
.geo-value{font-family:var(--font-mono);font-size:11px;color:#c8e6f5;}

/* ── NEW: Alert History Table ── */
.history-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:10px;}
.history-table th{text-align:left;padding:6px 10px;font-size:9px;letter-spacing:2px;color:rgba(200,230,245,0.3);border-bottom:1px solid var(--border-subtle);text-transform:uppercase;background:rgba(0,0,0,0.2);}
.history-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.history-table tr:hover td{background:rgba(0,229,255,0.03);}

/* ── NEW: Network Connections Table ── */
.conn-status{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:600;letter-spacing:1px;}
.conn-status.ESTABLISHED{background:var(--success-dim);color:var(--success);border:1px solid var(--success);}
.conn-status.LISTEN{background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan);}
.conn-status.TIME_WAIT{background:var(--warning-dim);color:var(--warning);border:1px solid var(--warning);}
.conn-status.other{background:rgba(255,255,255,0.05);color:rgba(200,230,245,0.4);border:1px solid rgba(255,255,255,0.1);}

/* ── NEW: DEFCON Badge ── */
.defcon-strip{display:flex;align-items:center;gap:16px;padding:10px 16px;background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:4px;margin-bottom:12px;flex-shrink:0;}
.defcon-level-box{font-family:var(--font-display);font-size:28px;font-weight:900;line-height:1;min-width:48px;text-align:center;}
.defcon-info{flex:1;}
.defcon-title{font-family:var(--font-display);font-size:10px;letter-spacing:3px;margin-bottom:4px;}
.defcon-desc{font-size:10px;color:rgba(200,230,245,0.5);font-family:var(--font-mono);}

/* ── NEW: Rule Builder ── */
.rule-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border-subtle);border-radius:4px;background:rgba(0,0,0,0.2);margin-bottom:6px;font-family:var(--font-mono);font-size:10px;}
.rule-item.active{border-left:3px solid var(--success);}
.rule-item.disabled{border-left:3px solid rgba(255,255,255,0.1);opacity:0.5;}
.rule-badge{font-size:8px;padding:2px 6px;border-radius:10px;font-weight:700;letter-spacing:1px;}
.rule-badge.block{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger);}
.rule-badge.alert-only{background:var(--warning-dim);color:var(--warning);border:1px solid var(--warning);}
.rule-badge.allow{background:var(--success-dim);color:var(--success);border:1px solid var(--success);}

/* ── NEW: Tabs inside panels ── */
.inner-tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border-subtle);padding-bottom:8px;flex-shrink:0;}
.inner-tab{background:transparent;border:none;color:rgba(200,230,245,0.4);font-family:var(--font-mono);font-size:10px;padding:4px 12px;cursor:pointer;border-radius:3px;transition:all 0.2s;letter-spacing:1px;}
.inner-tab:hover{color:var(--cyan);background:var(--cyan-dim);}
.inner-tab.active{color:var(--cyan);background:var(--cyan-dim);border-bottom:2px solid var(--cyan);}

/* Tooltip */
.tooltip-wrap{position:relative;display:inline-block;}
.tooltip-wrap:hover .tooltip-box{display:block;}
.tooltip-box{display:none;position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:#0b1425;border:1px solid var(--border-mid);border-radius:4px;padding:6px 10px;font-family:var(--font-mono);font-size:9px;color:#c8e6f5;white-space:nowrap;z-index:100;}
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API_BASE = 'http://localhost:5000';

// ═══════════════════════════════════════════════
// LIVE STREAM WIDGET
// ═══════════════════════════════════════════════
const LiveStreamWidget = ({ packets }) => {
  const [isPaused, setIsPaused] = useState(false);
  const [showOnlyThreats, setShowOnly] = useState(false);
  const [displayed, setDisplayed] = useState(packets);
  useEffect(() => { if (!isPaused) setDisplayed(packets); }, [packets, isPaused]);
  const filtered = displayed.filter(p => showOnlyThreats ? p.suspicious : true);
  const threatCnt = displayed.filter(p => p.suspicious).length;
  return (
    <div className="glass-panel" style={{flex:1,minHeight:0}}>
      <div className="panel-header flex-between" style={{marginBottom:'10px'}}>
        <span><i className="fa-solid fa-satellite-dish"></i>&nbsp; Live Packet Stream</span>
        <span className="panel-badge" style={{color:threatCnt>0?'var(--danger)':'var(--success)',borderColor:'currentColor'}}>
          {threatCnt>0?`${threatCnt} THREATS`:'CLEAR'}
        </span>
      </div>
      <div className="stream-controls">
        <button className={`cyber-btn-sm ${isPaused?'danger active':''}`} onClick={()=>setIsPaused(p=>!p)}>
          <i className={`fa-solid fa-${isPaused?'play':'pause'}`}></i>&nbsp;{isPaused?'RESUME':'PAUSE'}
        </button>
        <button className={`cyber-btn-sm ${showOnlyThreats?'active':''}`} onClick={()=>setShowOnly(s=>!s)}>
          <i className="fa-solid fa-filter"></i>&nbsp;{showOnlyThreats?'THREATS ONLY':'ALL TRAFFIC'}
        </button>
        {isPaused&&<span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--warning)',letterSpacing:'2px'}}>⏸ PAUSED</span>}
      </div>
      <div className="stream-meta">
        <span>Visible: <span style={{color:'var(--cyan)'}}>{filtered.length}</span></span>
        <span>Threats: <span style={{color:threatCnt>0?'var(--danger)':'var(--success)'}}>{threatCnt}</span></span>
      </div>
      <div className="stream-header"><span>TIME</span><span>SOURCE</span><span>DESTINATION</span><span>PROTO</span></div>
      <div className="packet-stream">
        {filtered.length===0
          ? <div className="empty-state"><i className="fa-solid fa-satellite-dish"></i><span>{showOnlyThreats?'No threats detected':'Awaiting packet stream...'}</span></div>
          : filtered.map((pkt,i)=>(
            <div key={i} className={`packet-item ${pkt.suspicious?(pkt.severity==='High'?'malicious':'suspicious'):''}`}>
              <span>{pkt.timestamp}</span>
              <span title={pkt.source}>{pkt.source}</span>
              <span title={pkt.destination}>{pkt.destination}</span>
              <span><span className={`proto-badge proto-${pkt.protocol}`}>{pkt.protocol}</span></span>
            </div>
          ))
        }
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// NETWORK GRAPH WIDGET
// ═══════════════════════════════════════════════
const NetworkGraphWidget = ({ trafficData }) => {
  const maxVol = Math.max(...trafficData.map(d=>d.volume),1);
  const getBarClass = d => d.volume>80?'threat':d.volume>50?'suspicious':'normal';
  return (
    <div className="glass-panel" style={{flex:1,minHeight:0}}>
      <div className="panel-header">
        <i className="fa-solid fa-chart-line"></i>&nbsp; Network Traffic Load
        <span className="panel-badge text-dim" style={{color:'rgba(200,230,245,0.4)',borderColor:'rgba(200,230,245,0.15)',fontSize:'9px'}}>LIVE · {trafficData.length} SAMPLES</span>
      </div>
      <div className="graph-wrapper">
        <div className="graph-container">
          {[25,50,75].map(pct=><div key={pct} className="graph-gridline" style={{bottom:`${pct}%`}}/>)}
          <div className="graph-axis-y"/><div className="graph-axis-x"/>
          {trafficData.map((d,i)=><div key={i} className={`graph-bar ${getBarClass(d)}`} style={{height:`${(d.volume/maxVol)*95}%`}} title={`Volume: ${d.volume}`}/>)}
        </div>
        <div className="graph-legend">
          <span><span className="legend-dot" style={{background:'var(--cyan)'}}></span>Normal</span>
          <span><span className="legend-dot" style={{background:'var(--warning)'}}></span>Suspicious</span>
          <span><span className="legend-dot" style={{background:'var(--danger)'}}></span>Threat</span>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// DEEP SCAN WIDGET
// ═══════════════════════════════════════════════
const DeepScanWidget = ({ isScanning, scanProgress, scanStatus, scanThreats, startDeepScan }) => {
  const [executed, setExecuted] = useState({});
  const handleExecute = threat => {
    if (executed[threat.name]) return;
    setExecuted(prev=>({...prev,[threat.name]:'running'}));
    setTimeout(()=>setExecuted(prev=>({...prev,[threat.name]:'done'})),1500);
  };
  return (
    <div className="glass-panel action-center">
      <div className="panel-header"><i className="fa-solid fa-bolt"></i>&nbsp; Active Defense Grid</div>
      <div className="scan-btn-wrap">
        <button className={`cyber-btn ${isScanning?'scanning':''}`} onClick={startDeepScan} disabled={isScanning}>
          {isScanning?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp; SCAN IN PROGRESS</>:<><i className="fa-solid fa-shield-virus"></i>&nbsp; Initiate Deep Threat Scan</>}
        </button>
      </div>
      {isScanning&&(
        <div className="scan-progress-container fade-in">
          <div className="scan-status-row">
            <span style={{maxWidth:'75%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scanStatus||'Initializing...'}</span>
            <span className="scan-pct">{scanProgress}%</span>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${scanProgress}%`}}/></div>
        </div>
      )}
      {!isScanning&&scanStatus&&(
        <div className="fade-in" style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--cyan)',padding:'8px 0'}}>
          <i className="fa-solid fa-check-circle" style={{marginRight:'6px',color:'var(--success)'}}></i>{scanStatus}
        </div>
      )}
      {scanThreats.length>0&&(
        <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',marginTop:'10px'}}>
          <div className="threat-list-header"><i className="fa-solid fa-radiation" style={{marginRight:'6px'}}></i>{scanThreats.length} Anomal{scanThreats.length===1?'y':'ies'} Detected</div>
          <div className="threat-list">
            {scanThreats.map((threat,idx)=>(
              <div key={idx} className={`threat-item fade-in ${threat.severity}`}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="threat-name">{threat.name}</div>
                  <div className="threat-action"><i className="fa-solid fa-arrow-right" style={{marginRight:'4px',fontSize:'9px'}}></i>{threat.action}</div>
                </div>
                <button className={"execute-btn"+(executed[threat.name]==='done'?' done':'')} onClick={()=>handleExecute(threat)} disabled={!!executed[threat.name]}>
                  {executed[threat.name]==='running'?<><i className="fa-solid fa-spinner fa-spin" style={{marginRight:'4px'}}></i>RUNNING</>:executed[threat.name]==='done'?<><i className="fa-solid fa-check" style={{marginRight:'4px'}}></i>DONE</>:'EXECUTE'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
      {!isScanning&&scanThreats.length===0&&!scanStatus&&(
        <div className="empty-state" style={{flex:1}}><i className="fa-solid fa-shield-halved"></i><span>System secure — no threats detected</span></div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════
// AI ANALYZER WIDGET  (enhanced with IOC lookup + IP geo)
// ═══════════════════════════════════════════════
const AIAnalyzerWidget = ({ aiInput, setAiInput, handleAiAnalysis, isAnalyzing, aiResult }) => {
  const [tab, setTab] = useState('analyze');
  const [iocInput, setIocInput] = useState('');
  const [iocResult, setIocResult] = useState(null);
  const [iocLoading, setIocLoading] = useState(false);

  // Real IP geolocation via ip-api.com (free, no key)
  const lookupIOC = async () => {
    if (!iocInput.trim()) return;
    setIocLoading(true); setIocResult(null);
    const val = iocInput.trim();
    const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
    if (ipRegex.test(val)) {
      try {
        const r = await fetch(`http://ip-api.com/json/${val}?fields=status,message,country,regionName,city,isp,org,as,lat,lon,proxy,hosting,query`);
        const d = await r.json();
        if (d.status === 'success') {
          setIocResult({
            type: 'IP Address', indicator: val,
            country: d.country, region: d.regionName, city: d.city,
            isp: d.isp, org: d.org, asn: d.as,
            lat: d.lat, lon: d.lon,
            proxy: d.proxy ? '⚠ YES — Possible VPN/Proxy' : 'No',
            hosting: d.hosting ? '⚠ YES — Datacenter/Hosting IP' : 'No',
            risk: (d.proxy || d.hosting) ? 'Medium' : 'Low',
            note: (d.proxy||d.hosting)?'This IP is associated with a proxy/VPN or hosting provider — common in attacks.':'No immediate indicators of compromise from geo data.'
          });
        } else {
          setIocResult({ type:'IP Address', indicator: val, error: d.message||'Lookup failed (private/reserved IP?)' });
        }
      } catch(e) { setIocResult({error:'Network error — check connection'}); }
    } else {
      // Hash / domain — do heuristic analysis
      const isDomain = /^[a-zA-Z0-9][a-zA-Z0-9-]{1,61}[a-zA-Z0-9]\.[a-zA-Z]{2,}$/.test(val);
      const isHash = /^[a-fA-F0-9]{32,64}$/.test(val);
      const suspiciousTLDs = ['.xyz','.top','.club','.online','.site','.tk','.ml','.ga'];
      const hasSuspTLD = suspiciousTLDs.some(t => val.endsWith(t));
      const hasHyphen = (val.match(/-/g)||[]).length > 2;
      const isLong = val.length > 30;
      let risk = 'Low'; let notes = [];
      if (hasSuspTLD) { risk='High'; notes.push('Suspicious TLD commonly abused in phishing campaigns'); }
      if (hasHyphen)  { risk='Medium'; notes.push('Multiple hyphens — possible DGA or typosquat domain'); }
      if (isLong)     { notes.push('Unusually long domain — may be generated (DGA)'); }
      if (isHash)     { notes.push('File hash — cross-reference with VirusTotal for definitive verdict'); }
      setIocResult({
        type: isHash?'File Hash':isDomain?'Domain':'Unknown Indicator', indicator: val,
        risk, note: notes.length ? notes.join(' | ') : 'No automated red flags. Manual investigation recommended.',
        action: isHash ? 'Submit to VirusTotal/MalwareBazaar' : isDomain ? 'Check WHOIS, run DNS lookup, verify SSL cert' : 'Manual analysis required'
      });
    }
    setIocLoading(false);
  };

  const getSeverityClass = sev => (!sev?'':sev==='Critical'||sev==='High'?'Critical':sev);

  return (
    <div className="glass-panel" style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div className="panel-header"><i className="fa-solid fa-microchip"></i>&nbsp; Nexus AI Analyzer</div>
      <div className="inner-tabs">
        {[['analyze','fa-magnifying-glass','AI Analyze'],['ioc','fa-crosshairs','IOC Lookup']].map(([t,ic,label])=>(
          <button key={t} className={`inner-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            <i className={`fa-solid ${ic}`} style={{marginRight:'5px'}}></i>{label}
          </button>
        ))}
      </div>

      {tab==='analyze'&&(
        <>
          <textarea className="ai-analyzer-input" rows={3}
            placeholder="Enter suspicious IP, domain, hash, or log snippet... (Ctrl+Enter to analyze)"
            value={aiInput} onChange={e=>setAiInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))handleAiAnalysis();}}
            style={{marginBottom:'10px',flexShrink:0}}/>
          <button className="cyber-btn" onClick={handleAiAnalysis} disabled={isAnalyzing} style={{flexShrink:0}}>
            {isAnalyzing?<><i className="fa-solid fa-circle-nodes fa-spin"></i>&nbsp; Analyzing...</>:<><i className="fa-solid fa-magnifying-glass"></i>&nbsp; Analyze Threat</>}
          </button>
          {aiResult&&(
            <div className="ai-result fade-in" style={{flex:1,overflowY:'auto',marginTop:'12px'}}>
              <div className="ai-result-header">
                <span className="ai-category">{aiResult.category}</span>
                <span className={`severity-badge ${getSeverityClass(aiResult.severity)}`}>{aiResult.severity}</span>
              </div>
              <div className="confidence-row"><span className="confidence-label">CONFIDENCE</span><span className="confidence-val">{aiResult.confidence}</span></div>
              <div className="ai-mitre"><i className="fa-solid fa-diagram-project" style={{marginRight:'6px'}}></i>{aiResult.mitre_mapping}</div>
              {aiResult.attack_type&&<div style={{marginBottom:'8px',fontSize:'10px',color:'rgba(200,230,245,0.5)'}}><i className="fa-solid fa-skull-crossbones" style={{marginRight:'6px',color:'var(--warning)'}}></i>{aiResult.attack_type}</div>}
              <p className="ai-explanation">{aiResult.explanation}</p>
              <div className="ai-action"><div className="ai-action-label">Recommended Action</div>{aiResult.recommended_action}</div>
              {aiResult.mitigation&&aiResult.mitigation.length>0&&(
                <div style={{marginTop:'10px'}}>
                  <div style={{fontSize:'9px',letterSpacing:'2px',color:'rgba(200,230,245,0.4)',marginBottom:'6px',textTransform:'uppercase'}}>Mitigation Steps</div>
                  {aiResult.mitigation.map((step,i)=>(
                    <div key={i} style={{fontSize:'10px',color:'rgba(200,230,245,0.6)',padding:'3px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',display:'flex',gap:'8px'}}>
                      <span style={{color:'var(--cyan)',flexShrink:0}}>{String(i+1).padStart(2,'0')}</span>{step}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          {!aiResult&&!isAnalyzing&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-microchip"></i><span>Enter an indicator above to begin analysis</span></div>}
        </>
      )}

      {tab==='ioc'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'8px',fontFamily:'var(--font-mono)'}}>
            Lookup IP geo/reputation, domain flags, or file hash indicators.
          </div>
          <div style={{display:'flex',gap:'8px',marginBottom:'8px',flexShrink:0}}>
            <input className="ai-analyzer-input" style={{flex:1,padding:'8px 12px'}}
              placeholder="IP, domain, or MD5/SHA256 hash"
              value={iocInput} onChange={e=>setIocInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')lookupIOC();}}/>
            <button className="cyber-btn-sm active" onClick={lookupIOC} style={{padding:'0 16px',flexShrink:0}}>
              {iocLoading?<i className="fa-solid fa-spinner fa-spin"></i>:<><i className="fa-solid fa-crosshairs"></i>&nbsp;LOOKUP</>}
            </button>
          </div>
          {iocResult&&(
            <div className="ioc-result fade-in" style={{flex:1,overflowY:'auto'}}>
              {iocResult.error
                ? <div style={{color:'var(--danger)',fontSize:'11px'}}><i className="fa-solid fa-triangle-exclamation" style={{marginRight:'6px'}}></i>{iocResult.error}</div>
                : <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid var(--border-subtle)'}}>
                    <span style={{color:'var(--cyan)',fontWeight:600,fontSize:'11px'}}>{iocResult.type}</span>
                    {iocResult.risk&&<span className={`severity-badge ${iocResult.risk==='High'?'High':iocResult.risk==='Medium'?'Medium':'Low'}`}>RISK: {iocResult.risk}</span>}
                  </div>
                  {Object.entries(iocResult).filter(([k])=>!['type','error','risk','note','action','indicator'].includes(k)).map(([k,v])=>(
                    <div key={k} className="ioc-row">
                      <span className="ioc-key">{k.toUpperCase()}</span>
                      <span className="ioc-val">{String(v)}</span>
                    </div>
                  ))}
                  {iocResult.note&&<div style={{marginTop:'10px',padding:'8px',background:'rgba(0,0,0,0.3)',borderRadius:'4px',fontSize:'10px',color:'rgba(200,230,245,0.6)',borderLeft:'3px solid var(--purple)'}}>{iocResult.note}</div>}
                  {iocResult.action&&<div style={{marginTop:'8px',fontSize:'10px',color:'var(--cyan)',fontFamily:'var(--font-mono)'}}><i className="fa-solid fa-arrow-right" style={{marginRight:'6px'}}></i>{iocResult.action}</div>}
                </>
              }
            </div>
          )}
          {!iocResult&&!iocLoading&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-crosshairs"></i><span>Enter an indicator to look up</span></div>}
        </div>
      )}
    </div>
  );
};

// ADMIN LOGIN
// ═══════════════════════════════════════════════
const AdminLogin = ({ onLoginSuccess }) => {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const handleLogin = async e => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const res = await fetch(`${API_BASE}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const data = await res.json();
      if (res.ok&&data.success) onLoginSuccess();
      else setError(data.error||'Authentication Failed.');
    } catch { setError('Cannot reach backend server.'); }
    finally { setLoading(false); }
  };
  return (
    <div className="login-wrap fade-in">
      <div className="glass-panel login-panel">
        <div className="login-icon"><i className="fa-solid fa-lock"></i></div>
        <div className="login-title">RESTRICTED ACCESS</div>
        <div className="login-sub">Administrative credentials required.</div>
        <form className="login-form" onSubmit={handleLogin}>
          <div className="input-group"><i className="fa-solid fa-user"></i><input type="text" className="login-input" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} required autoComplete="username"/></div>
          <div className="input-group"><i className="fa-solid fa-key"></i><input type="password" className="login-input" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required autoComplete="current-password"/></div>
          {error&&<div className="error-msg fade-in"><i className="fa-solid fa-triangle-exclamation"></i>{error}</div>}
          <button type="submit" className="cyber-btn" disabled={loading} style={{marginTop:'8px'}}>
            {loading?<><i className="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Authenticating...</>:<><i className="fa-solid fa-right-to-bracket"></i>&nbsp; Authorize</>}
          </button>
        </form>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════
// ADMIN PANEL  (full real-world version)
// ═══════════════════════════════════════════════
const AdminPanel = ({ systemStats }) => {
  const [section, setSection] = useState('overview');
  const [config, setConfig] = useState({sniffing_paused:false,ai_enabled:true});
  const [blocklist, setBlocklist] = useState([]);
  const [banIp, setBanIp] = useState('');
  const [history, setHistory] = useState([]);
  const [processes, setProcesses] = useState([]);
  const [connections, setConnections] = useState([]);
  const [portTarget, setPortTarget] = useState('127.0.0.1');
  const [portResults, setPortResults] = useState([]);
  const [portScanning, setPortScanning] = useState(false);
  const [rules, setRules] = useState([
    {id:1,name:'Block Metasploit Default Port',match:'dst_port == 4444',action:'block',active:true},
    {id:2,name:'Alert on SYN Flood (>100 pkts/s)',match:'tcp.flags.syn && rate > 100',action:'alert-only',active:true},
    {id:3,name:'Allow Internal Subnet',match:'src_ip in 192.168.0.0/16',action:'allow',active:true},
    {id:4,name:'Block Tor Exit Nodes',match:'dst_ip in tor_exit_list',action:'block',active:false},
    {id:5,name:'Alert on DNS Tunneling',match:'dns.payload_len > 100',action:'alert-only',active:true},
  ]);
  const [auditLog, setAuditLog] = useState([
    {time:'--:--:--',user:'system',act:'CyberShield started'},
  ]);

  const addAudit = (user,act) => setAuditLog(prev=>[{time:new Date().toTimeString().split(' ')[0],user,act},...prev].slice(0,50));

  const fetchConfig = async()=>{
    try{const r=await fetch('/api/admin/config');const d=await r.json();setConfig(d.active_config||{});setBlocklist(d.blocked_ips||[]);}catch(e){}
  };
  const fetchHistory = async()=>{
    try{const r=await fetch('/api/history');const d=await r.json();setHistory(d.alerts||[]);}catch(e){}
  };
  const fetchProcesses = async()=>{
    try{const r=await fetch(`${API_BASE}/api/processes`);const d=await r.json();setProcesses(d.processes||[]);}catch(e){}
  };
  const fetchConnections = async()=>{
    try{const r=await fetch(`${API_BASE}/api/connections`);const d=await r.json();setConnections(d.connections||[]);}catch(e){}
  };

  useEffect(()=>{
    fetchConfig();fetchHistory();
    const iv=setInterval(()=>{fetchConfig();fetchHistory();},5000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(section==='processes')fetchProcesses();
    if(section==='connections')fetchConnections();
  },[section]);

  const toggle = async key=>{
    const nv=!config[key];
    setConfig(p=>({...p,[key]:nv}));
    await fetch('/api/admin/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[key]:nv})});
    addAudit('admin',`${key} set to ${nv}`);
  };

  const handleBan = async()=>{
    if(!banIp.trim())return;
    const parts=banIp.trim().split('.');
    if(parts.length!==4||!parts.every(p=>!isNaN(p)&&+p>=0&&+p<=255)){alert('Invalid IP format');return;}
    await fetch('/api/admin/blocklist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:banIp.trim()})});
    addAudit('admin',`Banned IP: ${banIp.trim()}`);
    setBanIp('');fetchConfig();
  };

  const runPortScan = async()=>{
    setPortScanning(true);setPortResults([]);
    try{
      const r=await fetch(`${API_BASE}/api/portscan`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:portTarget})});
      const d=await r.json();
      setPortResults(d.results||[]);
      addAudit('admin',`Port scan on ${portTarget}: ${(d.results||[]).filter(p=>p.state==='open').length} open ports`);
    }catch(e){setPortResults([{port:'Error',state:'closed',service:'Backend unreachable'}]);}
    setPortScanning(false);
  };

  const toggleRule = id=>{
    setRules(prev=>prev.map(r=>r.id===id?{...r,active:!r.active}:r));
    const rule=rules.find(r=>r.id===id);
    addAudit('admin',`Rule "${rule?.name}" ${rule?.active?'disabled':'enabled'}`);
  };

  const statColor=pct=>pct>80?'var(--danger)':pct>60?'var(--warning)':'var(--cyan)';

  const defconLevel=()=>{
    const threats=history.filter(h=>h.severity==='Critical'||h.severity==='High').length;
    if(threats>10)return{level:1,color:'var(--danger)',desc:'Maximum readiness — critical breach detected'};
    if(threats>5)return{level:2,color:'var(--danger)',desc:'Increased threat activity — active response'};
    if(threats>2)return{level:3,color:'var(--warning)',desc:'Elevated alert — monitoring intensified'};
    if(threats>0)return{level:4,color:'var(--warning)',desc:'Below normal tension — watch conditions'};
    return{level:5,color:'var(--success)',desc:'Normal readiness — no significant threats'};
  };
  const defcon=defconLevel();

  const SECTIONS=[
    ['overview','fa-gauge-high','Overview'],
    ['firewall','fa-shield-virus','Firewall'],
    ['processes','fa-microchip','Processes'],
    ['connections','fa-network-wired','Connections'],
    ['portscan','fa-binoculars','Port Scanner'],
    ['history','fa-clock-rotate-left','Alert History'],
    ['rules','fa-list-check','IDS Rules'],
    ['logs','fa-terminal','Audit Log'],
  ];

  return (
    <div className="admin-layout admin-theme">
      {/* Sub-nav */}
      <div style={{display:'flex',gap:'4px',flexWrap:'wrap',flexShrink:0}}>
        {SECTIONS.map(([id,ic,label])=>(
          <button key={id} className={`nav-tab ${section===id?'active':''}`} style={{fontSize:'10px',padding:'5px 12px'}} onClick={()=>setSection(id)}>
            <i className={`fa-solid ${ic}`} style={{marginRight:'5px'}}></i>{label}
          </button>
        ))}
      </div>

      {/* ── OVERVIEW ── */}
      {section==='overview'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          {/* DEFCON */}
          <div className="defcon-strip" style={{borderColor:defcon.color,background:`rgba(0,0,0,0.4)`}}>
            <div className="defcon-level-box" style={{color:defcon.color,textShadow:`0 0 20px ${defcon.color}`}}>D{defcon.level}</div>
            <div className="defcon-info">
              <div className="defcon-title" style={{color:defcon.color}}>DEFCON {defcon.level} — {['','COCKED PISTOL','FAST PACE','ROUND HOUSE','DOUBLE TAKE','FADE OUT'][defcon.level]}</div>
              <div className="defcon-desc">{defcon.desc}</div>
            </div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'rgba(200,230,245,0.4)',textAlign:'right'}}>
              <div>{history.filter(h=>h.severity==='Critical').length} CRITICAL</div>
              <div>{history.filter(h=>h.severity==='High').length} HIGH</div>
              <div>{history.length} TOTAL ALERTS</div>
            </div>
          </div>
          {/* Stats */}
          <div style={{display:'flex',gap:'12px'}}>
            {[['CPU Usage',systemStats?.cpu_percent,'%'],['Memory',systemStats?.memory_percent,'%'],['Disk',systemStats?.disk_percent,'%'],['TCP Conns',systemStats?.net_connections,'']].map(([label,val,unit])=>(
              <div key={label} className="stat-box" style={{flex:1}}>
                <div className="stat-label">{label}</div>
                <div className="stat-value" style={{color:val!=null&&unit==='%'?statColor(val):'var(--cyan)'}}>{val!=null?`${val}${unit}`:'---'}</div>
                {val!=null&&unit==='%'&&<div className="progress-bar" style={{height:'3px',marginTop:'4px'}}><div className="progress-fill" style={{width:`${val}%`,background:statColor(val)}}/></div>}
              </div>
            ))}
          </div>
          {/* Engine Config */}
          <div className="glass-panel">
            <div className="panel-header"><i className="fa-solid fa-gears"></i>&nbsp; Engine Configuration</div>
            <div style={{display:'flex',flexDirection:'column'}}>
              {[
                {label:'Live Packet Capture',key:'sniffing_paused',invert:true,on:'ACTIVE',off:'PAUSED'},
                {label:'AI Threat Analysis Engine',key:'ai_enabled',invert:false,on:'ONLINE',off:'OFFLINE'},
              ].map(({label,key,invert,on,off})=>{
                const isOn=invert?!config[key]:config[key];
                return(
                  <div key={key} className="toggle-row">
                    <span style={{fontSize:'12px'}}>{label}</span>
                    <button className={`cyber-btn-sm ${isOn?'active':'danger active'}`} onClick={()=>toggle(key)}>{isOn?on:off}</button>
                  </div>
                );
              })}
              {[
                {label:'Honeypot Protocols',status:'DEPLOYED',on:true},
                {label:'Reverse IP Tracing',status:'OFFLINE',on:false},
                {label:'DB Auto-Encryption',status:'STANDBY',on:false},
              ].map(({label,status,on})=>(
                <div key={label} className="toggle-row">
                  <span style={{fontSize:'12px'}}>{label}</span>
                  <button className={`cyber-btn-sm ${on?'active':'danger active'}`}>{status}</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── FIREWALL ── */}
      {section==='firewall'&&(
        <div className="glass-panel">
          <div className="panel-header"><i className="fa-solid fa-shield-virus"></i>&nbsp; IP Firewall Blocklist</div>
          <p style={{fontSize:'11px',color:'rgba(200,230,245,0.4)',marginBottom:'12px',fontFamily:'var(--font-mono)'}}>
            Manually ban IPs. Blocked IPs are rejected at the application layer and logged.
          </p>
          <div className="blocklist-input-row">
            <input className="ai-analyzer-input" placeholder="e.g. 203.0.113.42" value={banIp} onChange={e=>setBanIp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleBan()}/>
            <button className="ban-btn" onClick={handleBan}>BAN</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'6px',maxHeight:'300px',overflowY:'auto'}}>
            {blocklist.length===0
              ? <div style={{fontSize:'11px',color:'rgba(200,230,245,0.3)',fontFamily:'var(--font-mono)',padding:'6px 0'}}>No IPs currently blocked.</div>
              : blocklist.map((ip,i)=>(
                <div key={i} className="blocked-ip">
                  <span><i className="fa-solid fa-ban" style={{marginRight:'6px'}}></i>{ip}</span>
                  <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                    <span style={{fontSize:'9px',letterSpacing:'1px'}}>BLOCKED</span>
                    <button className="cyber-btn-sm danger" style={{padding:'2px 8px',fontSize:'9px'}} onClick={async()=>{
                      await fetch('/api/admin/blocklist',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});
                      addAudit('admin',`Unbanned IP: ${ip}`);fetchConfig();
                    }}>UNBAN</button>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* ── PROCESSES ── */}
      {section==='processes'&&(
        <div className="glass-panel">
          <div className="panel-header">
            <i className="fa-solid fa-microchip"></i>&nbsp; Running Processes
            <button className="cyber-btn-sm active" style={{marginLeft:'auto'}} onClick={fetchProcesses}><i className="fa-solid fa-rotate"></i>&nbsp;REFRESH</button>
          </div>
          <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'10px',fontFamily:'var(--font-mono)'}}>
            Live process list. Highlighted rows indicate suspicious execution paths or high CPU usage.
          </p>
          <div style={{overflowY:'auto',flex:1}}>
            {processes.length===0
              ? <div className="empty-state"><i className="fa-solid fa-spinner fa-spin"></i><span>Loading process list...</span></div>
              : <table className="proc-table">
                <thead><tr><th>PID</th><th>Name</th><th>CPU %</th><th>RAM MB</th><th>Status</th></tr></thead>
                <tbody>
                  {processes.map((p,i)=>(
                    <tr key={i} className={p.suspicious?'proc-row-suspicious':p.critical?'proc-row-critical':''}>
                      <td style={{color:'rgba(200,230,245,0.4)'}}>{p.pid}</td>
                      <td>{p.name}{p.suspicious&&<span style={{marginLeft:'6px',color:'var(--warning)',fontSize:'9px'}}>⚠</span>}</td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                          {p.cpu.toFixed(1)}%
                          <div className="cpu-bar-wrap"><div className="cpu-bar-fill" style={{width:`${Math.min(p.cpu,100)}%`,background:p.cpu>80?'var(--danger)':p.cpu>50?'var(--warning)':'var(--cyan)'}}></div></div>
                        </div>
                      </td>
                      <td>{(p.mem/1024/1024).toFixed(1)}</td>
                      <td><span className={`conn-status ${p.status==='running'?'ESTABLISHED':'other'}`}>{p.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            }
          </div>
        </div>
      )}

      {/* ── CONNECTIONS ── */}
      {section==='connections'&&(
        <div className="glass-panel">
          <div className="panel-header">
            <i className="fa-solid fa-network-wired"></i>&nbsp; Active Network Connections
            <button className="cyber-btn-sm active" style={{marginLeft:'auto'}} onClick={fetchConnections}><i className="fa-solid fa-rotate"></i>&nbsp;REFRESH</button>
          </div>
          <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'10px',fontFamily:'var(--font-mono)'}}>
            All active TCP/UDP connections. Flags external established connections for review.
          </p>
          <div style={{overflowY:'auto',flex:1}}>
            {connections.length===0
              ? <div className="empty-state"><i className="fa-solid fa-spinner fa-spin"></i><span>Loading connections...</span></div>
              : <table className="history-table">
                <thead><tr><th>Proto</th><th>Local</th><th>Remote</th><th>Status</th><th>PID</th></tr></thead>
                <tbody>
                  {connections.map((c,i)=>(
                    <tr key={i} style={c.external?{background:'rgba(255,171,0,0.05)'}:{}}>
                      <td><span className="proto-badge proto-TCP">TCP</span></td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:'10px'}}>{c.local}</td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:c.external?'var(--warning)':'inherit'}}>{c.remote||'—'}{c.external&&<span style={{marginLeft:'4px',fontSize:'9px',color:'var(--warning)'}}>EXT</span>}</td>
                      <td><span className={`conn-status ${c.status}`}>{c.status}</span></td>
                      <td style={{color:'rgba(200,230,245,0.4)',fontSize:'10px'}}>{c.pid||'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            }
          </div>
        </div>
      )}

      {/* ── PORT SCANNER ── */}
      {section==='portscan'&&(
        <div className="glass-panel">
          <div className="panel-header"><i className="fa-solid fa-binoculars"></i>&nbsp; Local Port Scanner</div>
          <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'12px',fontFamily:'var(--font-mono)'}}>
            Scan common ports on a target host to identify open services. Use on systems you own or have permission to test.
          </p>
          <div style={{display:'flex',gap:'8px',marginBottom:'12px',flexShrink:0}}>
            <input className="ai-analyzer-input" style={{flex:1,padding:'8px 12px'}} placeholder="Target IP (e.g. 127.0.0.1)" value={portTarget} onChange={e=>setPortTarget(e.target.value)}/>
            <button className="cyber-btn-sm active" style={{padding:'0 20px'}} onClick={runPortScan} disabled={portScanning}>
              {portScanning?<><i className="fa-solid fa-spinner fa-spin"></i>&nbsp;SCANNING</>:<><i className="fa-solid fa-binoculars"></i>&nbsp;SCAN</>}
            </button>
          </div>
          {portResults.length>0&&(
            <div style={{flex:1,overflowY:'auto'}}>
              <div style={{display:'flex',gap:'16px',marginBottom:'10px',fontFamily:'var(--font-mono)',fontSize:'10px'}}>
                <span style={{color:'var(--danger)'}}>{portResults.filter(p=>p.state==='open').length} OPEN</span>
                <span style={{color:'var(--warning)'}}>{portResults.filter(p=>p.state==='filtered').length} FILTERED</span>
                <span style={{color:'rgba(200,230,245,0.4)'}}>{portResults.filter(p=>p.state==='closed').length} CLOSED</span>
              </div>
              <div className="port-result-grid">
                {portResults.map((p,i)=>(
                  <div key={i} className={`port-chip ${p.state}`}>
                    <span className="port-chip-num">{p.port}</span>
                    <span className="port-chip-svc">{p.service}</span>
                    <span style={{fontSize:'8px',textTransform:'uppercase',letterSpacing:'1px'}}>{p.state}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {portResults.length===0&&!portScanning&&<div className="empty-state" style={{flex:1}}><i className="fa-solid fa-binoculars"></i><span>Enter a target and click SCAN</span></div>}
        </div>
      )}

      {/* ── ALERT HISTORY ── */}
      {section==='history'&&(
        <div className="glass-panel">
          <div className="panel-header">
            <i className="fa-solid fa-clock-rotate-left"></i>&nbsp; Alert History
            <span className="panel-badge" style={{color:'var(--cyan)',borderColor:'var(--border-mid)',marginLeft:'auto'}}>{history.length} RECORDS</span>
          </div>
          <div style={{overflowY:'auto',flex:1}}>
            {history.length===0
              ? <div className="empty-state"><i className="fa-solid fa-clock-rotate-left"></i><span>No alert history yet</span></div>
              : <table className="history-table">
                <thead><tr><th>Time</th><th>Source</th><th>Threat</th><th>Severity</th><th>Module</th></tr></thead>
                <tbody>
                  {history.map((a,i)=>(
                    <tr key={i}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'rgba(200,230,245,0.4)',whiteSpace:'nowrap'}}>{a.timestamp}</td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:'10px'}}>{a.source_module}</td>
                      <td style={{maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'11px'}}>{a.threat_name}</td>
                      <td><span className={`severity-badge ${a.severity==='Critical'||a.severity==='High'?'High':a.severity}`}>{a.severity}</span></td>
                      <td style={{fontSize:'9px',color:'rgba(200,230,245,0.4)',fontFamily:'var(--font-mono)'}}>{a.source_module}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            }
          </div>
        </div>
      )}

      {/* ── IDS RULES ── */}
      {section==='rules'&&(
        <div className="glass-panel">
          <div className="panel-header"><i className="fa-solid fa-list-check"></i>&nbsp; IDS / Firewall Rules</div>
          <p style={{fontSize:'10px',color:'rgba(200,230,245,0.4)',marginBottom:'12px',fontFamily:'var(--font-mono)'}}>
            Intrusion detection rules. Toggle to enable/disable. Rules are evaluated in order.
          </p>
          <div style={{display:'flex',flexDirection:'column',gap:'6px',flex:1,overflowY:'auto'}}>
            {rules.map(rule=>(
              <div key={rule.id} className={`rule-item ${rule.active?'active':'disabled'}`}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:'11px',marginBottom:'3px'}}>{rule.name}</div>
                  <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'rgba(200,230,245,0.4)'}}>{rule.match}</div>
                </div>
                <span className={`rule-badge ${rule.action}`}>{rule.action.toUpperCase()}</span>
                <button className={`cyber-btn-sm ${rule.active?'active':'danger'}`} style={{marginLeft:'8px',minWidth:'60px'}} onClick={()=>toggleRule(rule.id)}>
                  {rule.active?'ON':'OFF'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── AUDIT LOG ── */}
      {section==='logs'&&(
        <div className="glass-panel" style={{flex:1}}>
          <div className="panel-header"><i className="fa-solid fa-terminal"></i>&nbsp; System Audit Log</div>
          <div className="audit-log-window" style={{height:'auto',flex:1,maxHeight:'none'}}>
            {auditLog.map((log,i)=>(
              <div key={i} className="audit-entry">
                <span className="audit-time">[{log.time}]</span>
                <span className="audit-user">{log.user}@cybershield:~$</span>
                <span>{log.act}</span>
              </div>
            ))}
            <div className="audit-entry">
              <span className="audit-time">[{new Date().toTimeString().split(' ')[0]}]</span>
              <span className="audit-user">admin@cybershield:~$</span>
              <span className="blink">_</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function Dashboard() {
  const [packets, setPackets] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [systemStatus, setSystemStatus] = useState('Initializing...');
  const [activeTab, setActiveTab] = useState('dashboard');
  const [isAdminAuthed, setAdminAuthed] = useState(false);
  const [systemStats, setSystemStats] = useState(null);
  const [isScanning, setIsScanning] = useState(false);
  const [scanProgress, setScanProgress] = useState(0);
  const [scanStatus, setScanStatus] = useState('');
  const [scanThreats, setScanThreats] = useState([]);
  const [aiInput, setAiInput] = useState('');
  const [aiResult, setAiResult] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [trafficData, setTrafficData] = useState(Array(30).fill({volume:5}));
  const [clock, setClock] = useState('');

  useEffect(()=>{const tick=()=>setClock(new Date().toLocaleTimeString('en-GB'));tick();const id=setInterval(tick,1000);return()=>clearInterval(id);},[]);

  const fetchStats = useCallback(async()=>{
    try{const r=await fetch(`${API_BASE}/api/system_stats`);const d=await r.json();setSystemStats(d);}catch{}
  },[]);
  useEffect(()=>{fetchStats();const id=setInterval(fetchStats,5000);return()=>clearInterval(id);},[fetchStats]);

  useEffect(()=>{
    const sock=io(API_BASE);
    sock.on('connect',()=>setSystemStatus('DEFENSE GRID ONLINE'));
    sock.on('disconnect',()=>setSystemStatus('CONNECTION LOST'));
    sock.on('new_packet',pkt=>{
      setPackets(prev=>[pkt,...prev].slice(0,50));
      setTrafficData(prev=>{const vol=pkt.suspicious?Math.floor(Math.random()*40)+60:Math.floor(Math.random()*35)+10;return[...prev.slice(1),{volume:vol,suspicious:pkt.suspicious}];});
    });
    sock.on('new_alert',alert=>setAlerts(prev=>[alert,...prev].slice(0,15)));
    sock.on('scan_progress',data=>{setScanProgress(data.percent);setScanStatus(data.status);if(data.percent>=100)setIsScanning(false);});
    sock.on('scan_threat',data=>setScanThreats(prev=>{const ex=new Set(prev.map(t=>t.name));return[...prev,...data.threats.filter(t=>!ex.has(t.name))];}));
    sock.on('scan_complete',data=>{setScanStatus(`Scan Complete — Security Score: ${data.score}/100`);setIsScanning(false);});
    return()=>sock.close();
  },[]);

  const startDeepScan=async()=>{
    if(isScanning)return;
    setIsScanning(true);setScanProgress(0);setScanThreats([]);setScanStatus('');
    try{await fetch(`${API_BASE}/api/scan`,{method:'POST'});}catch{setIsScanning(false);}
  };

  const handleAiAnalysis=async()=>{
    if(!aiInput.trim()||isAnalyzing)return;
    setIsAnalyzing(true);setAiResult(null);
    try{const r=await fetch(`${API_BASE}/api/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:aiInput})});setAiResult(await r.json());}
    finally{setIsAnalyzing(false);}
  };

  const threatCount=alerts.filter(a=>a.severity==='High'||a.severity==='Critical').length;
  const isConnected=systemStatus.includes('ONLINE');

  return (
    <div className="dashboard-layout fade-in">
      <header className="header">
        <div className="logo-container">
          <div className="logo-icon"><i className="fa-solid fa-shield-halved"></i></div>
          <div><div style={{display:'flex',alignItems:'baseline',gap:'8px'}}><span className="logo-text">CYBERSHIELD</span><span className="logo-version">SOC.02</span></div></div>
        </div>
        <div className="header-center">
          <div className="header-stat"><span className="header-stat-value">{clock}</span><span className="header-stat-label">System Time</span></div>
          <div className="header-divider"/>
          <div className="header-stat"><span className="header-stat-value" style={{color:threatCount>0?'var(--danger)':'var(--success)'}}>{threatCount}</span><span className="header-stat-label">Active Threats</span></div>
          <div className="header-divider"/>
          <div className="header-stat"><span className="header-stat-value">{packets.length}</span><span className="header-stat-label">Packets Buffered</span></div>
          <div className="header-divider"/>
          <nav className="nav-tabs">
            {['dashboard','admin'].map(tab=>(
              <button key={tab} className={`nav-tab ${activeTab===tab?'active':''}`} onClick={()=>setActiveTab(tab)}>
                {tab==='dashboard'?<><i className="fa-solid fa-gauge-high"></i>&nbsp;Dashboard</>:<><i className="fa-solid fa-user-shield"></i>&nbsp;Admin</>}
              </button>
            ))}
          </nav>
        </div>
        <div className="system-status">
          <div className="status-indicator" style={{borderColor:isConnected?'rgba(0,230,118,0.3)':'rgba(255,23,68,0.3)',background:isConnected?'rgba(0,230,118,0.06)':'rgba(255,23,68,0.06)'}}>
            <div className="status-dot" style={{background:isConnected?'var(--success)':'var(--danger)'}}/>
            <span className="status-text" style={{color:isConnected?'var(--success)':'var(--danger)'}}>{isConnected?'ONLINE':'OFFLINE'}</span>
          </div>
        </div>
      </header>

      {activeTab==='dashboard'&&(
        <>
          <div className="left-col"><LiveStreamWidget packets={packets}/></div>
          <div className="center-col">
            <NetworkGraphWidget trafficData={trafficData}/>
            <DeepScanWidget isScanning={isScanning} scanProgress={scanProgress} scanStatus={scanStatus} scanThreats={scanThreats} startDeepScan={startDeepScan}/>
          </div>
          <div className="right-col">
            <AIAnalyzerWidget aiInput={aiInput} setAiInput={setAiInput} handleAiAnalysis={handleAiAnalysis} isAnalyzing={isAnalyzing} aiResult={aiResult}/>
            <AlertsWidget alerts={alerts}/>
          </div>
        </>
      )}

      {activeTab==='admin'&&(
        <div style={{gridColumn:'1/-1',minHeight:0,overflow:'auto'}}>
          {!isAdminAuthed?<AdminLogin onLoginSuccess={()=>setAdminAuthed(true)}/>:<AdminPanel systemStats={systemStats}/>}
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard/>);
</script>
</body>
</html>
