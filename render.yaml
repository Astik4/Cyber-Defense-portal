services:
  - type: web
    name: cyber-defense-portal
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --threads 100 --bind 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: PORT
        value: 5000
